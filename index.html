<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="GvyTGbIx3Zov0CXr0f1voJ2LJnac-ppCl62NStzdY3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ManzChat - Live Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .pb-safe { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }
            .pt-safe { padding-top: max(0.75rem, env(safe-area-inset-top)); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-fall { animation: fall linear forwards; }
        .chat-bubble-me { border-bottom-right-radius: 4px; }
        .chat-bubble-other { border-bottom-left-radius: 4px; }
    </style>
</head>
<body class="flex items-center justify-center fixed inset-0 bg-gray-100 text-gray-800 font-sans overflow-hidden w-full h-full">
    
    <!-- Notification Bar -->
    <div id="notification-bar" class="fixed top-4 md:top-6 left-1/2 transform -translate-x-1/2 bg-white border-l-4 border-indigo-600 text-gray-800 px-4 py-3 rounded-xl shadow-2xl z-[100] flex items-center gap-3 transition-transform duration-300 translate-y-[-150%] cursor-pointer min-w-[300px] max-w-[90%]">
        <img id="notif-avatar" src="" class="w-10 h-10 rounded-full object-cover shadow-sm border border-gray-100">
        <div class="flex flex-col overflow-hidden flex-1">
            <span id="notif-title" class="font-bold text-sm truncate text-gray-800"></span>
            <span id="notif-desc" class="text-xs text-gray-500 truncate mt-0.5"></span>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 bg-white/90 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity duration-300">

            <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mb-4 shadow-lg"></div>
            <p class="text-indigo-600 font-bold tracking-wide">Loading ManzChat...</p>
        </div>
    </div>

    <!-- Container -->

                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>

                    <button id="open-edit-modal-btn" class="text-gray-400 hover:text-indigo-600 transition p-2.5 bg-gray-50 hover:bg-indigo-50 rounded-full flex-shrink-0 border border-gray-100 shadow-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>

                    </div>
                    <div class="flex-1 min-h-0 overflow-y-auto p-2 pb-safe md:pb-2">

                    </div>
                </div>

                <div id="panel-public" class="hidden flex-1 flex-col min-h-0 overflow-y-auto bg-white p-4 items-center justify-center space-y-3">

                        <button id="find-tk-match-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded-xl transition shadow-sm">Find Online Match</button>
                    </div>

                    <p id="match-status" class="text-sm text-center text-indigo-500 font-semibold"></p>
                </div>

            </div>
            
            <!-- Chat / Game Area -->
            <div id="main-content-area" class="hidden md:flex flex-1 flex-col h-full overflow-hidden absolute md:relative inset-0 md:inset-auto z-30 md:z-10 animate-fade-in w-full bg-gray-50">
                
                <!-- Chat Header -->
                <div id="chat-header" class="bg-white px-4 py-3 md:px-6 md:py-4 flex items-center justify-between shadow-sm border-b border-gray-200 z-20 hidden pt-safe shrink-0">
                    <div class="flex items-center gap-3">
                        <button id="back-to-sidebar-btn" class="md:hidden p-2 -ml-2 text-gray-500 hover:text-indigo-600 transition rounded-full hover:bg-gray-100">

                        </button>
                        <div id="chat-user-profile" class="flex items-center gap-3 cursor-pointer">

                            </div>
                        </div>
                    </div>
                </div>

                    <h2 class="text-2xl font-bold text-gray-700 mb-2">Welcome to ManzChat</h2>
                    <p class="text-gray-500 text-center max-w-xs">Select a friend to start chatting or play a game.</p>

                <!-- Messages Area -->
                <div id="messages" class="flex-1 min-h-0 overflow-y-auto p-4 md:p-6 space-y-5 bg-[#E5DDD5] hidden relative z-10"></div>
                
                <!-- Input Area -->
                <div id="input-area" class="bg-white p-3 md:p-4 border-t border-gray-200 flex items-center gap-2 md:gap-3 pb-safe z-20 hidden shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] shrink-0 w-full">
                    <input id="message-input" type="text" class="w-full px-4 py-3 bg-gray-100 rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition shadow-sm" placeholder="Type a message...">
                    <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-full w-12 h-12 flex items-center justify-center transition shadow-md active:scale-95">

                            <div class="ttt-cell w-20 h-20 bg-white rounded-xl flex items-center justify-center text-5xl font-bold cursor-pointer hover:bg-gray-50 transition" data-index="4"></div>

                            </div>
                            <div id="tk-play" class="hidden flex-col w-full gap-4">
                                <div class="bg-purple-100 p-3 rounded-xl text-center">
                                    <p class="text-sm text-purple-800 font-bold">Tebak kata lawanmu!</p>
                                </div>
                                <div id="tk-chat" class="h-48 overflow-y-auto bg-white border border-gray-200 rounded-xl p-3 flex flex-col gap-2 text-sm"></div>
                                <div class="flex gap-2">
                                    <input id="tk-guess-input" type="text" class="flex-1 px-3 py-2 border rounded-xl" placeholder="Tebakanmu...">
                                    <button id="tk-guess-btn" class="bg-purple-600 text-white px-4 py-2 rounded-xl font-bold">Kirim</button>

                    </div>
                </div>

            </div>
        </div>

        let currentUserDoc = null;
        let currentMode = 'private'; 
        let currentChatFriend = null;
        let messagesUnsubscribe = null;
        let friendsUnsubscribe = null;
        let publicUnsubscribe = null;
        
        // Elements
        const loadingScreen = document.getElementById('loading-screen');
        const joinScreen = document.getElementById('join-screen');
        const mainScreen = document.getElementById('main-screen');
        const chatHeader = document.getElementById('chat-header');
        const noChatHeader = document.getElementById('no-chat-header');
        const messagesDiv = document.getElementById('messages');
        const inputArea = document.getElementById('input-area');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        const sidebar = document.getElementById('sidebar');

        onAuthStateChanged(auth, async (user) => {
            loadingScreen.classList.add('hidden');
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    const generatedUsername = (user.displayName || 'User').replace(/\s+/g, '') + Math.floor(Math.random() * 1000);
                    currentUserDoc = { 
                        uid: user.uid, username: generatedUsername, avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`, 
                        isOnline: true, tttWins: 0, tkWins: 0 
                    };
                    await setDoc(userRef, currentUserDoc);
                } else {
                    currentUserDoc = userSnap.data();
                    if(currentUserDoc.tttWins === undefined) currentUserDoc.tttWins = 0;
                    if(currentUserDoc.tkWins === undefined) currentUserDoc.tkWins = 0;
                    await updateDoc(userRef, { isOnline: true });
                }
                
                document.getElementById('my-avatar').src = currentUserDoc.avatar;
                document.getElementById('my-username').innerText = currentUserDoc.username;
                document.getElementById('ttt-crowns').innerText = currentUserDoc.tttWins || 0;

                mainScreen.classList.remove('hidden');
                mainScreen.classList.add('flex');

                        document.getElementById('ttt-crowns').innerText = data.tttWins || 0;
                        document.getElementById('tk-crowns').innerText = (data.tkWins || 0) * 2;
                        currentUserDoc = data;
                    }

                joinScreen.classList.remove('hidden');
                joinScreen.classList.add('flex');
                mainScreen.classList.add('hidden');
                mainScreen.classList.remove('flex');

            }

        document.getElementById('google-login-btn').addEventListener('click', () => signInWithPopup(auth, provider));
        
        document.getElementById('leave-btn').addEventListener('click', () => {
            document.getElementById('logout-modal').classList.remove('hidden');
        });
        document.getElementById('btn-cancel-logout').addEventListener('click', () => {
            document.getElementById('logout-modal').classList.add('hidden');
        });
        document.getElementById('btn-logout-account').addEventListener('click', () => {
            document.getElementById('logout-modal').classList.add('hidden');
            signOut(auth);
        });
        document.getElementById('btn-delete-account').addEventListener('click', async () => {
            if(confirm("Apakah kamu yakin ingin menghapus akun ini permanen?")) {
                const user = auth.currentUser;
                if(user) {
                    await deleteDoc(doc(db, "users", user.uid));
                    await deleteUser(user);
                    document.getElementById('logout-modal').classList.add('hidden');
                }
            }
        });

        function switchTab(mode) {
            currentMode = mode;
            ['private', 'public', 'game'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.remove('text-indigo-600', 'border-indigo-600');
                document.getElementById(`tab-${t}`).classList.add('text-gray-500', 'border-transparent');

            document.getElementById(`tab-${mode}`).classList.remove('text-gray-500', 'border-transparent');
            document.getElementById(`tab-${mode}`).classList.add('text-indigo-600', 'border-indigo-600');
            
            chatHeader.classList.add('hidden');
            noChatHeader.classList.add('hidden');
            noChatHeader.classList.remove('flex');
            messagesDiv.classList.add('hidden');
            inputArea.classList.add('hidden');
            panelPrivate.classList.add('hidden');
            panelPublic.classList.add('hidden');
            document.getElementById('panel-game').classList.add('hidden');

                panelPrivate.classList.remove('hidden');
                panelPrivate.classList.add('flex');

            } else if (mode === 'public') {
                panelPublic.classList.remove('hidden');
                panelPublic.classList.add('flex');
                if (window.innerWidth >= 768) { noChatHeader.classList.remove('hidden'); noChatHeader.classList.add('flex'); mainContentArea.classList.remove('hidden'); mainContentArea.classList.add('flex'); }
            } else if (mode === 'game') {
                document.getElementById('panel-game').classList.remove('hidden');
                document.getElementById('panel-game').classList.add('flex');

        }

        document.getElementById('tab-private').addEventListener('click', () => switchTab('private'));
        document.getElementById('tab-public').addEventListener('click', () => switchTab('public'));
        document.getElementById('tab-game').addEventListener('click', () => switchTab('game'));
        
        document.getElementById('back-to-sidebar-btn').addEventListener('click', () => {
            sidebar.classList.remove('hidden');
            mainContentArea.classList.add('hidden');
            mainContentArea.classList.remove('flex');
        });

        function loadFriends() {
            const q = query(collection(db, "users", currentUserDoc.uid, "friends"));
            friendsUnsubscribe = onSnapshot(q, (snapshot) => {
                friendsList.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const friendData = docSnap.data();
                    const div = document.createElement('div');
                    div.className = "flex items-center gap-3 p-3 hover:bg-white rounded-xl cursor-pointer transition border border-transparent hover:border-gray-200 hover:shadow-sm mb-1";
                    div.innerHTML = `
                        <img src="${friendData.avatar}" class="w-12 h-12 rounded-full object-cover shadow-sm border border-gray-100">
                        <div class="flex flex-col flex-1 truncate">
                            <span class="font-bold text-gray-800 text-sm truncate">${friendData.username}</span>
                        </div>
                    `;
                    div.onclick = () => openPrivateChat(friendData);
                    friendsList.appendChild(div);
                });
            });
        }

        document.getElementById('add-friend-btn').addEventListener('click', async () => {
            const username = document.getElementById('friend-username-input').value.trim();
            if(!username || username === currentUserDoc.username) return;
            const q = query(collection(db, "users"), where("username", "==", username));
            const snap = await getDocs(q);
            if(!snap.empty) {
                const friendDoc = snap.docs[0].data();
                await setDoc(doc(db, "users", currentUserDoc.uid, "friends", friendDoc.uid), { uid: friendDoc.uid, username: friendDoc.username, avatar: friendDoc.avatar });
                await setDoc(doc(db, "users", friendDoc.uid, "friends", currentUserDoc.uid), { uid: currentUserDoc.uid, username: currentUserDoc.username, avatar: currentUserDoc.avatar });
                document.getElementById('friend-username-input').value = '';
                alert("Friend added!");
            } else { alert("User not found!"); }
        });

        window.addFriendFromPublic = async (uid, username) => {
            if(uid === currentUserDoc.uid) return;
            const userSnap = await getDoc(doc(db, "users", uid));
            if(userSnap.exists()){
                const fData = userSnap.data();
                await setDoc(doc(db, "users", currentUserDoc.uid, "friends", fData.uid), { uid: fData.uid, username: fData.username, avatar: fData.avatar });
                await setDoc(doc(db, "users", fData.uid, "friends", currentUserDoc.uid), { uid: currentUserDoc.uid, username: currentUserDoc.username, avatar: currentUserDoc.avatar });
                alert(`${username} added to friends!`);
            }
        }

        window.openPrivateChat = function(friend) {
            currentMode = 'private';
            currentChatFriend = friend;
            
            if (window.innerWidth < 768) { sidebar.classList.add('hidden'); mainContentArea.classList.remove('hidden'); mainContentArea.classList.add('flex'); }
            noChatHeader.classList.add('hidden'); noChatHeader.classList.remove('flex');
            chatHeader.classList.remove('hidden'); messagesDiv.classList.remove('hidden'); inputArea.classList.remove('hidden');
            
            document.getElementById('chat-avatar').src = friend.avatar;
            document.getElementById('chat-display-name').innerText = friend.username;
            document.getElementById('chat-status').innerText = 'Friend';

            if(messagesUnsubscribe) messagesUnsubscribe();
            const chatId = currentUserDoc.uid < friend.uid ? `${currentUserDoc.uid}_${friend.uid}` : `${friend.uid}_${currentUserDoc.uid}`;
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            messagesUnsubscribe = onSnapshot(q, (snapshot) => {
                messagesDiv.innerHTML = '';
                snapshot.forEach((docSnap) => displayMessage(docSnap.data(), docSnap.id));
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        };

        document.getElementById('btn-global-chat').addEventListener('click', () => {
            currentMode = 'public';
            if (window.innerWidth < 768) { sidebar.classList.add('hidden'); mainContentArea.classList.remove('hidden'); mainContentArea.classList.add('flex'); }
            noChatHeader.classList.add('hidden'); noChatHeader.classList.remove('flex');
            chatHeader.classList.remove('hidden'); messagesDiv.classList.remove('hidden'); inputArea.classList.remove('hidden');
            
            document.getElementById('chat-avatar').src = 'https://api.dicebear.com/7.x/shapes/svg?seed=public';
            document.getElementById('chat-display-name').innerText = 'Public Global Chat';
            document.getElementById('chat-status').innerText = 'Everyone is here';

            if(publicUnsubscribe) publicUnsubscribe();
            const q = query(collection(db, "public_messages"), orderBy("timestamp", "asc"));
            publicUnsubscribe = onSnapshot(q, (snapshot) => {
                messagesDiv.innerHTML = '';
                snapshot.forEach((docSnap) => displayMessage(docSnap.data(), docSnap.id));
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        });

        function displayMessage(msg, docId) {
            const isMe = msg.senderId === currentUserDoc.uid;
            const msgEl = document.createElement('div');
            msgEl.className = `flex w-full space-x-2 max-w-[85%] animate-slide-up ${isMe ? 'ml-auto justify-end space-x-reverse' : ''}`;
            
            let addFriendBtn = (!isMe && currentMode === 'public') ? `<button onclick="addFriendFromPublic('${msg.senderId}', '${msg.senderName}')" class="text-[10px] text-indigo-500 ml-2 font-bold">Add Friend</button>` : '';

            msgEl.innerHTML = `
                ${!isMe && currentMode === 'public' ? `<img src="${msg.avatar}" class="h-8 w-8 rounded-full object-cover self-end mb-1">` : ''}
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-full">
                    ${!isMe && currentMode === 'public' ? `<span class="text-[11px] text-gray-500 mb-1 px-1 font-bold">${msg.senderName} ${addFriendBtn}</span>` : ''}
                    <div class="px-4 py-2.5 text-[15px] shadow-sm break-words max-w-full ${isMe ? 'bg-indigo-600 text-white rounded-2xl rounded-tr-sm' : 'bg-white border text-gray-800 rounded-2xl rounded-tl-sm'}">
                        <span>${msg.text}</span>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(msgEl);
        }

        sendBtn.addEventListener('click', async () => {
            const text = messageInput.value.trim();
            if(!text) return;
            messageInput.value = '';
            const msgData = { senderId: currentUserDoc.uid, senderName: currentUserDoc.username, avatar: currentUserDoc.avatar, text: text, timestamp: serverTimestamp() };
            if(currentMode === 'private' && currentChatFriend) {
                const chatId = currentUserDoc.uid < currentChatFriend.uid ? `${currentUserDoc.uid}_${currentChatFriend.uid}` : `${currentChatFriend.uid}_${currentUserDoc.uid}`;
                await addDoc(collection(db, "chats", chatId, "messages"), msgData);
            } else if(currentMode === 'public') {
                await addDoc(collection(db, "public_messages"), msgData);
            }
        });

        // ================= GAME LOGIC (TTT & TEBAK KATA) =================
        let currentGameId = null;
        let gameType = null; // 'ttt' or 'tk'
        let gameUnsubscribe = null;
        let tkChatUnsubscribe = null;
        let myScore = 0; let oppScore = 0;

        function quitGame() {
            if(gameUnsubscribe) { gameUnsubscribe(); gameUnsubscribe = null; }
            if(tkChatUnsubscribe) { tkChatUnsubscribe(); tkChatUnsubscribe = null; }
            currentGameId = null; gameType = null;
            document.getElementById('game-area').classList.add('hidden');
            document.getElementById('game-area').classList.remove('flex');
            document.getElementById('match-status').innerText = "";
            switchTab('game');
        }

        document.getElementById('game-quit-btn').addEventListener('click', async () => {
            if(currentGameId) {
                await updateDoc(doc(db, gameType === 'ttt' ? "tictactoe_games" : "tebak_kata_games", currentGameId), { status: 'quit' });
            }
            quitGame();
        });
        document.getElementById('back-from-game-btn').addEventListener('click', () => quitGame());
        
        // Matchmaking TTT
        document.getElementById('find-match-btn').addEventListener('click', async () => {
            document.getElementById('match-status').innerText = "Searching TTT match...";
            await setDoc(doc(db, "tictactoe_queue", currentUserDoc.uid), { uid: currentUserDoc.uid, username: currentUserDoc.username, avatar: currentUserDoc.avatar, timestamp: serverTimestamp() });
            setTimeout(async () => {
                const qQueue = query(collection(db, "tictactoe_queue"), orderBy("timestamp", "asc"));
                const queueSnap = await getDocs(qQueue);
                let opponent = null;
                queueSnap.forEach(docSnap => { if(docSnap.id !== currentUserDoc.uid && !opponent) opponent = docSnap.data(); });

                if(opponent) {
                    const gameId = `${opponent.uid}_${currentUserDoc.uid}`;
                    await setDoc(doc(db, "tictactoe_games", gameId), { player1: opponent, player2: { uid: currentUserDoc.uid, username: currentUserDoc.username, avatar: currentUserDoc.avatar }, board: ['', '', '', '', '', '', '', '', ''], turn: 'X', status: 'playing', winner: null, score1: 0, score2: 0 });
                    await deleteDoc(doc(db, "tictactoe_queue", currentUserDoc.uid)); await deleteDoc(doc(db, "tictactoe_queue", opponent.uid));
                    joinTTT(gameId);
                } else {
                    const qGame = query(collection(db, "tictactoe_games"), where("player1.uid", "==", currentUserDoc.uid), where("status", "==", "playing"));
                    let unsub = onSnapshot(qGame, (snap) => {
                        if(!snap.empty) { joinTTT(snap.docs[0].id); unsub(); }
                    });
                }
            }, 1000);
        });

        function joinTTT(gameId) {
            currentGameId = gameId; gameType = 'ttt';
            document.getElementById('match-status').innerText = "";
            document.getElementById('tictactoe-board').classList.remove('hidden');
            document.getElementById('tictactoe-board').classList.add('grid');
            document.getElementById('tebak-kata-ui').classList.add('hidden');
            document.getElementById('tebak-kata-ui').classList.remove('flex');
            
            if (window.innerWidth < 768) { sidebar.classList.add('hidden'); mainContentArea.classList.remove('hidden'); mainContentArea.classList.add('flex'); }
            document.getElementById('game-area').classList.remove('hidden'); document.getElementById('game-area').classList.add('flex');
            
            gameUnsubscribe = onSnapshot(doc(db, "tictactoe_games", gameId), (docSnap) => {
                if(!docSnap.exists()) return;
                const data = docSnap.data();
                if(data.status === 'quit') { quitGame(); return; }
                const isP1 = data.player1.uid === currentUserDoc.uid;
                const opp = isP1 ? data.player2 : data.player1;
                document.getElementById('game-opponent-avatar').src = opp.avatar;
                document.getElementById('game-opponent-username').innerText = opp.username;
                document.getElementById('my-score').innerText = isP1 ? data.score1 : data.score2;
                document.getElementById('opp-score').innerText = isP1 ? data.score2 : data.score1;
                
                let mySym = isP1 ? 'X' : 'O';
                document.getElementById('game-status-text').innerText = data.winner ? (data.winner === mySym ? "You Win!" : "You Lose!") : `Turn: ${data.turn}`;
                
                if(data.winner && data.winner === mySym && data.status === 'finished') {
                    updateDoc(doc(db, "users", currentUserDoc.uid), { tttWins: increment(1) });
                    updateDoc(doc(db, "tictactoe_games", gameId), { status: 'scored' });
                }

                document.querySelectorAll('.ttt-cell').forEach((cell, i) => {
                    cell.innerText = data.board[i];
                    cell.onclick = async () => {
                        if(!data.winner && data.turn === mySym && data.board[i] === '') {
                            let nb = [...data.board]; nb[i] = mySym;
                            let win = null;
                            const wp = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                            for(let p of wp) { if(nb[p[0]] && nb[p[0]]===nb[p[1]] && nb[p[0]]===nb[p[2]]) win = nb[p[0]]; }
                            if(!win && !nb.includes('')) win = 'Draw';
                            let upd = { board: nb, turn: mySym==='X'?'O':'X', winner: win };
                            if(win) { upd.status = 'finished'; if(win===mySym) upd[isP1?'score1':'score2'] = increment(1); }
                            await updateDoc(doc(db, "tictactoe_games", gameId), upd);
                        }
                    };
                });
                if(data.winner) {
                    document.getElementById('game-actions').classList.remove('hidden');
                    document.getElementById('play-again-btn').onclick = () => {
                        updateDoc(doc(db, "tictactoe_games", gameId), { board: ['', '', '', '', '', '', '', '', ''], winner: null, status: 'playing', turn: 'X' });
                    };
                } else document.getElementById('game-actions').classList.add('hidden');
            });
        }

        // Matchmaking Tebak Kata
        document.getElementById('find-tk-match-btn').addEventListener('click', async () => {
            document.getElementById('match-status').innerText = "Searching TK match...";
            await setDoc(doc(db, "tebak_kata_queue", currentUserDoc.uid), { uid: currentUserDoc.uid, username: currentUserDoc.username, avatar: currentUserDoc.avatar, timestamp: serverTimestamp() });
            setTimeout(async () => {
                const qQueue = query(collection(db, "tebak_kata_queue"), orderBy("timestamp", "asc"));
                const queueSnap = await getDocs(qQueue);
                let opponent = null;
                queueSnap.forEach(docSnap => { if(docSnap.id !== currentUserDoc.uid && !opponent) opponent = docSnap.data(); });

                if(opponent) {
                    const gameId = `${opponent.uid}_${currentUserDoc.uid}`;
                    await setDoc(doc(db, "tebak_kata_games", gameId), { player1: opponent, player2: { uid: currentUserDoc.uid, username: currentUserDoc.username, avatar: currentUserDoc.avatar }, word1: '', word2: '', status: 'setup', score1: 0, score2: 0 });
                    await deleteDoc(doc(db, "tebak_kata_queue", currentUserDoc.uid)); await deleteDoc(doc(db, "tebak_kata_queue", opponent.uid));
                    joinTK(gameId);
                } else {
                    const qGame = query(collection(db, "tebak_kata_games"), where("player1.uid", "==", currentUserDoc.uid), where("status", "==", "setup"));
                    let unsub = onSnapshot(qGame, (snap) => {
                        if(!snap.empty) { joinTK(snap.docs[0].id); unsub(); }
                    });
                }
            }, 1000);
        });

        function joinTK(gameId) {
            currentGameId = gameId; gameType = 'tk';
            document.getElementById('match-status').innerText = "";
            document.getElementById('tictactoe-board').classList.add('hidden');
            document.getElementById('tictactoe-board').classList.remove('grid');
            document.getElementById('tebak-kata-ui').classList.remove('hidden');
            document.getElementById('tebak-kata-ui').classList.add('flex');
            
            if (window.innerWidth < 768) { sidebar.classList.add('hidden'); mainContentArea.classList.remove('hidden'); mainContentArea.classList.add('flex'); }
            document.getElementById('game-area').classList.remove('hidden'); document.getElementById('game-area').classList.add('flex');
            
            document.getElementById('tk-setup').classList.remove('hidden');
            document.getElementById('tk-play').classList.add('hidden');
            document.getElementById('tk-secret-word').value = '';

            gameUnsubscribe = onSnapshot(doc(db, "tebak_kata_games", gameId), (docSnap) => {
                if(!docSnap.exists()) return;
                const data = docSnap.data();
                if(data.status === 'quit') { quitGame(); return; }
                const isP1 = data.player1.uid === currentUserDoc.uid;
                const opp = isP1 ? data.player2 : data.player1;
                document.getElementById('game-opponent-avatar').src = opp.avatar;
                document.getElementById('game-opponent-username').innerText = opp.username;
                document.getElementById('my-score').innerText = isP1 ? data.score1 : data.score2;
                document.getElementById('opp-score').innerText = isP1 ? data.score2 : data.score1;

                if(data.status === 'setup') {
                    document.getElementById('game-status-text').innerText = "Tulis Kata Rahasiamu";
                    document.getElementById('tk-setup').classList.remove('hidden');
                    document.getElementById('tk-play').classList.add('hidden');
                    document.getElementById('game-actions').classList.add('hidden');
                } else if(data.status === 'playing') {
                    document.getElementById('game-status-text').innerText = "Tebak Kata Lawan!";
                    document.getElementById('tk-setup').classList.add('hidden');
                    document.getElementById('tk-play').classList.remove('hidden');
                    document.getElementById('tk-play').classList.add('flex');
                    document.getElementById('game-actions').classList.add('hidden');
                } else if(data.status === 'finished') {
                    document.getElementById('tk-play').classList.add('hidden');
                    document.getElementById('game-status-text').innerText = data.winner === currentUserDoc.uid ? "Kamu Menang! 🎉" : "Kamu Kalah! 😢";
                    document.getElementById('game-actions').classList.remove('hidden');
                    
                    if(data.winner === currentUserDoc.uid && !data.scored) {
                        updateDoc(doc(db, "users", currentUserDoc.uid), { tkWins: increment(1) });
                        updateDoc(doc(db, "tebak_kata_games", gameId), { scored: true });
                    }

                    document.getElementById('play-again-btn').onclick = () => {
                        updateDoc(doc(db, "tebak_kata_games", gameId), { status: 'setup', word1: '', word2: '', winner: null, scored: false });
                    };
                }
            });

            if(tkChatUnsubscribe) tkChatUnsubscribe();
            tkChatUnsubscribe = onSnapshot(query(collection(db, "tebak_kata_games", gameId, "messages"), orderBy("timestamp", "asc")), (snap) => {
                const c = document.getElementById('tk-chat'); c.innerHTML = '';
                snap.forEach(docSnap => {
                    const m = docSnap.data();
                    const isMe = m.senderId === currentUserDoc.uid;
                    let actions = '';
                    if(!isMe && m.type === 'guess') {
                        actions = `
                            <div class="flex gap-1 mt-2">
                                <button onclick="tkRespond('${docSnap.id}', 'Benar')" class="bg-green-500 text-white px-2 py-1 rounded text-xs">Benar</button>
                                <button onclick="tkRespond('${docSnap.id}', 'Salah')" class="bg-red-500 text-white px-2 py-1 rounded text-xs">Salah</button>
                                <button onclick="tkRespond('${docSnap.id}', 'Mungkin')" class="bg-yellow-500 text-white px-2 py-1 rounded text-xs">Mungkin</button>
                            </div>
                        `;
                    }
                    let respText = m.response ? `<div class="mt-1 text-xs font-bold text-gray-700 bg-gray-200 p-1 rounded">Respon: ${m.response}</div>` : '';
                    
                    c.innerHTML += `
                        <div class="max-w-[85%] px-3 py-2 rounded-xl shadow-sm ${isMe ? 'bg-purple-100 self-end text-right' : 'bg-gray-100 self-start'}">
                            <span class="font-bold text-xs text-purple-800 block">${m.senderName}</span>
                            <span>${m.text}</span>
                            ${respText}
                            ${actions}
                        </div>
                    `;
                });
                c.scrollTop = c.scrollHeight;
            });
        }

        document.getElementById('tk-set-btn').addEventListener('click', async () => {
            const word = document.getElementById('tk-secret-word').value.trim();
            if(!word || !currentGameId) return;
            const docRef = doc(db, "tebak_kata_games", currentGameId);
            const snap = await getDoc(docRef);
            const data = snap.data();
            const isP1 = data.player1.uid === currentUserDoc.uid;
            
            let upd = { [isP1 ? 'word1' : 'word2']: word };
            if((isP1 && data.word2) || (!isP1 && data.word1)) upd.status = 'playing';
            
            await updateDoc(docRef, upd);
            document.getElementById('tk-setup').innerHTML = `<p class="font-bold text-gray-600">Menunggu lawan...</p>`;
        });

        document.getElementById('tk-guess-btn').addEventListener('click', async () => {
            const txt = document.getElementById('tk-guess-input').value.trim();
            if(!txt || !currentGameId) return;
            document.getElementById('tk-guess-input').value = '';
            await addDoc(collection(db, "tebak_kata_games", currentGameId, "messages"), {
                senderId: currentUserDoc.uid, senderName: currentUserDoc.username, text: txt, type: 'guess', timestamp: serverTimestamp()
            });
        });

        window.tkRespond = async (msgId, response) => {
            await updateDoc(doc(db, "tebak_kata_games", currentGameId, "messages", msgId), { response: response, type: 'answered' });
            if(response === 'Benar') {
                const docRef = doc(db, "tebak_kata_games", currentGameId);
                const snap = await getDoc(docRef);
                const data = snap.data();
                const isP1 = data.player1.uid === currentUserDoc.uid; // I clicked Benar, so opponent wins
                await updateDoc(docRef, { status: 'finished', winner: isP1 ? data.player2.uid : data.player1.uid, [isP1 ? 'score2' : 'score1']: increment(1) });
            }
        };

    </script>
</body>
</html>
