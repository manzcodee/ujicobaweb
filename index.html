<!DOCTYPE html>
<html lang="id">
<head>
    <!-- InstanWeb AI Iframe Router Guard -->
    <script id="instanweb-iframe-guard">
    (function() {
        if (window !== window.parent) {
            const originalReplace = window.location.replace;
            window.location.replace = function(url) {
                const hashIndex = url.indexOf('#');
                if (hashIndex !== -1) {
                    window.location.hash = url.substring(hashIndex);
                    return;
                }
                try { originalReplace.call(window.location, url); } catch(e) { window.location.hash = url; }
            };
            window.location.assign = window.location.replace;
        }
    })();
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManzCodeCBT</title>
    <link rel="icon" href="https://i.ibb.co.com/nqLTzP3S/Chat-GPT-Image-10-Mei-2026-21-40-08.png" type="image/png">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen text-gray-800 pb-16">

    <!-- Navbar -->

            <div id="nav-user" class="hidden flex items-center gap-4">

    <main class="flex-grow p-4 max-w-7xl mx-auto">

                <form id="student-reg-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Nama Lengkap</label>

                        <label class="block text-sm font-medium text-gray-700">Asal Sekolah</label>

                        </select>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">DAFTAR SEKARANG</button>

        <!-- Payment Section (Sertifikat Only Here) -->
        <section id="payment-section" class="page-section w-full max-w-2xl mx-auto fade-in">
            <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">Pengambilan Sertifikat</h2>
                <div id="dynamic-packages-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                    <!-- Paket (Nama, Nominal, Diskon) -->
                </div>
                <button onclick="confirmPaymentWA()" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold">
                    <i class="fab fa-whatsapp mr-2"></i> Kirim Konfirmasi ke Admin

        <!-- Admin Testimonials -->
        <section id="admin-testimonial-section" class="page-section w-full max-w-4xl mx-auto">
            <div class="bg-white p-6 rounded-2xl shadow-lg">
                <h3 class="text-xl font-bold mb-4">Kelola Testimoni</h3>
                <form id="admin-testimonial-form" class="space-y-4 mb-6">
                    <input type="url" id="testi-img" placeholder="Link Foto" class="w-full p-2 border rounded" required>
                    <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded">Upload Testimoni</button>
                </form>
            </div>
        </section>

    </main>

    <!-- Bottom Nav (Removed "Sertifikat" from Dashboard, kept in Payment) -->
    <nav id="bottom-navbar" class="fixed bottom-0 w-full bg-white border-t flex justify-around p-3 z-40">
        <a href="#dashboard" class="flex flex-col items-center text-gray-500"><i class="fas fa-home"></i><span class="text-[10px]">Dashboard</span></a>
        <a href="#pendaftaran" class="flex flex-col items-center text-gray-500"><i class="fas fa-plus"></i><span class="text-[10px]">Daftar</span></a>
        <a href="#payment" class="flex flex-col items-center text-indigo-600"><i class="fas fa-certificate"></i><span class="text-[10px]">Sertifikat</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = { /* ... your config ... */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Auto-fill Testimonial Time
        document.getElementById('admin-testimonial-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const now = new Date();
            const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
            
            await addDoc(collection(db, "testimonials"), {
                img: document.getElementById('testi-img').value,
                day: days[now.getDay()],
                date: now.getDate(),
                month: months[now.getMonth()],
                year: now.getFullYear(),
                time: now.getHours() + ":" + now.getMinutes(),
                timestamp: serverTimestamp()
            });
            alert("Testimoni terunggah!");
        });

        // WhatsApp Auto-fill logic
        window.confirmPaymentWA = function() {
            const name = localStorage.getItem('studentName') || 'Peserta';
            const text = `Halo Admin, saya ${name} ingin mengambil sertifikat. Data: [Nama, Sekolah, Jenjang, Mapel].`;
            window.open(`https://wa.me/6282254388144?text=${encodeURIComponent(text)}`);
        }
    </script>

    <!-- InstanWeb AI Resiliency Fallback Script (Anti-Blank-Screen) -->
    <script id="instanweb-resiliency-fallback">
    (function() {
        window.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                if (!window.db) {
                    console.warn("⚠️ Firebase load failed, blocked, or slow (e.g. CORS on local file:// or bad version). Instantiating highly resilient LocalStorage mock engine...");
                    setupMockFirebase();
                    
                    // Re-trigger standard load routes
                    if (typeof handleRoute === 'function') {
                        console.log("Re-executing routes in offline sandbox...");
                        handleRoute();
                    }
                }
            }, 180);
        });

        function setupMockFirebase() {
            function getLocalData(colName) {
                const key = "mock_db_" + colName;
                const data = localStorage.getItem(key);
                if (!data) {
                    let initial = [];
                    if (colName === 'settings') {
                        initial = [{ id: 'global', showScore: true, paymentActive: true }];
                    } else if (colName === 'exams') {
                        initial = [
                            {
                                id: 'seed_math',
                                code: 'MATE23',
                                subject: 'Matematika Dasar',
                                duration: '60',
                                status: 'Aktif',
                                isKisiKisi: true,
                                questions: [
                                    {
                                        level: 'SD/MI',
                                        text: 'Berapakah hasil dari 25 x 4 + 50?',
                                        options: ['100', '150', '200', '250'],
                                        correctIndex: 1,
                                        image: ''
                                    },
                                    {
                                        level: 'SD/MI',
                                        text: 'Jika sebuah segitiga memiliki alas 10 cm dan tinggi 8 cm, berapakah luas segitiga tersebut?',
                                        options: ['40 cm²', '80 cm²', '20 cm²', '16 cm²'],
                                        correctIndex: 0,
                                        image: ''
                                    },
                                    {
                                        level: 'SMP/MTS',
                                        text: 'Tentukan nilai x dari persamaan kuadrat x² - 5x + 6 = 0!',
                                        options: ['x = 2 atau x = 3', 'x = -2 atau x = -3', 'x = 1 atau x = 6', 'x = -1 atau x = -6'],
                                        correctIndex: 0,
                                        image: ''
                                    },
                                    {
                                        level: 'SMA/SMK',
                                        text: 'Berapakah turunan pertama f_prime(x) dari f(x) = 3x³ - 5x² + 2x - 7?',
                                        options: ['f_prime(x) = 9x² - 10x + 2', 'f_prime(x) = 3x² - 5x + 2', 'f_prime(x) = 9x³ - 10x² + 2', 'f_prime(x) = 6x² - 5x + 2'],
                                        correctIndex: 0,
                                        image: ''
                                    }
                                ]
                            }
                        ];
                    } else if (colName === 'testimonials') {
                        initial = [
                            {
                                id: 'testi_1',
                                img: 'https://i.ibb.co.com/8DZVQkBv/sertifikat-manzcodecbt.png',
                                day: 'Senin',
                                date: '25',
                                month: 'Mei',
                                year: '2026',
                                time: '09:30',
                                timestamp: { seconds: Date.now() / 1000 }
                            }
                        ];
                    } else if (colName === 'broadcasts') {
                        initial = [
                            {
                                id: 'bc_welcome',
                                target: 'ALL',
                                text: 'Selamat datang di ManzCodeCBT! Gunakan Akun Ujian Anda atau masukkan kode ujian di atas untuk berpartisipasi.',
                                timestamp: { seconds: Date.now() / 1000 }
                            }
                        ];
                    }
                    localStorage.setItem(key, JSON.stringify(initial));
                    return initial;
                }
                return JSON.parse(data);
            }

            function setLocalData(colName, list) {
                localStorage.setItem("mock_db_" + colName, JSON.stringify(list));
                triggerListeners(colName);
            }

            const listeners = {};
            function triggerListeners(colName) {
                if (listeners[colName]) {
                    listeners[colName].forEach(function(cb) { cb(); });
                }
            }

            window.db = { isMock: true };
            window.collection = function(db, colName) { return { type: 'collection', name: colName }; };
            window.doc = function(db, colName, docId) { return { type: 'doc', col: colName, id: docId }; };
            window.query = function(col, constraints) { return { type: 'query', col: col.name, constraints: Array.prototype.slice.call(arguments, 1) }; };
            window.where = function(field, op, val) { return { type: 'where', field: field, op: op, val: val }; };

            window.addDoc = async function(colRef, data) {
                const colName = colRef.name;
                const list = getLocalData(colName);
                const newId = colName + "_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5);
                const enriched = Object.assign({ id: newId, timestamp: { seconds: Date.now() / 1000 } }, data);
                list.push(enriched);
                setLocalData(colName, list);
                return { id: newId };
            };

            window.setDoc = async function(docRef, data) {
                const colName = docRef.col;
                const docId = docRef.id;
                const list = getLocalData(colName);
                const idx = list.findIndex(function(item) { return item.id === docId; });
                if (idx !== -1) {
                    list[idx] = Object.assign({ id: docId }, data);
                } else {
                    list.push(Object.assign({ id: docId }, data));
                }
                setLocalData(colName, list);
            };

            window.updateDoc = async function(docRef, data) {
                const colName = docRef.col;
                const docId = docRef.id;
                const list = getLocalData(colName);
                const idx = list.findIndex(function(item) { return item.id === docId; });
                if (idx !== -1) {
                    list[idx] = Object.assign({}, list[idx], data);
                    setLocalData(colName, list);
                }
            };

            window.deleteDoc = async function(docRef) {
                const colName = docRef.col;
                const docId = docRef.id;
                const list = getLocalData(colName);
                const filtered = list.filter(function(item) { return item.id !== docId; });
                setLocalData(colName, filtered);
            };

            window.getDoc = async function(docRef) {
                const colName = docRef.col;
                const docId = docRef.id;
                const list = getLocalData(colName);
                const found = list.find(function(item) { return item.id === docId; });
                return {
                    exists: function() { return found !== undefined; },
                    data: function() { return found; }
                };
            };

            window.getDocs = async function(queryOrCol) {
                const colName = queryOrCol.type === 'query' ? queryOrCol.col : queryOrCol.name;
                let list = getLocalData(colName);

                if (queryOrCol.type === 'query' && queryOrCol.constraints) {
                    queryOrCol.constraints.forEach(function(con) {
                        if (con && con.type === 'where') {
                            list = list.filter(function(item) {
                                const val = item[con.field];
                                if (con.op === '==') return val === con.val;
                                return true;
                            });
                        }
                    });
                }

                return {
                    empty: list.length === 0,
                    forEach: function(cb) {
                        list.forEach(function(item) {
                            cb({
                                id: item.id,
                                data: function() { return item; }
                            });
                        });
                    }
                };
            };

            window.onSnapshot = function(ref, callback) {
                const colName = ref.col || ref.name;
                if (!listeners[colName]) {
                    listeners[colName] = [];
                }

                const listenerWrapper = async function() {
                    if (ref.id) {
                        const list = getLocalData(colName);
                        const found = list.find(function(item) { return item.id === ref.id; });
                        callback({
                            exists: function() { return found !== undefined; },
                            data: function() { return found; }
                        });
                    } else {
                        const snapshot = await window.getDocs(ref);
                        callback(snapshot);
                    }
                };

                listeners[colName].push(listenerWrapper);
                listenerWrapper();

                return function() {
                    listeners[colName] = listeners[colName].filter(function(cb) { return cb !== listenerWrapper; });
                };
            };
        }
    })();
    </script>
    </body>
</html>
