<!DOCTYPE html>
<html lang="id">
<head>
    <!-- InstanWeb AI Iframe Router Guard -->
    <script id="instanweb-iframe-guard">
    (function() {
        if (window !== window.parent) {
            const originalReplace = window.location.replace;
            window.location.replace = function(url) {
                const hashIndex = url.indexOf('#');
                if (hashIndex !== -1) {
                    window.location.hash = url.substring(hashIndex);
                    return;
                }
                const originPrefix = window.location.origin + '/';
                const cleanUrl = url.split('?')[0];
                if (url === '/' || url === '' || cleanUrl === originPrefix || cleanUrl === window.location.origin) {
                    return;
                }
                try { originalReplace.call(window.location, url); } catch(e) { window.location.hash = url; }
            };
            window.location.assign = window.location.replace;
        }
    })();
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManzCodeCBT</title>
    <link rel="icon" href="https://i.ibb.co.com/nqLTzP3S/Chat-GPT-Image-10-Mei-2026-21-40-08.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .page-section { display: none; }
        .page-section.active { display: block; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen text-gray-800">

    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <a href="#" class="flex items-center gap-3">
                <img src="https://i.ibb.co.com/nqLTzP3S/Chat-GPT-Image-10-Mei-2026-21-40-08.png" class="h-8 w-8 object-contain">
                <span class="font-bold text-lg text-indigo-900">ManzCodeCBT</span>
            </a>
            <div id="nav-user" class="hidden flex items-center gap-4">
                <button onclick="confirmLogout()" class="text-sm bg-red-500 text-white px-4 py-1.5 rounded-lg">Logout</button>
            </div>
        </div>
    </nav>

    <main class="flex flex-col items-center justify-center p-4 w-full max-w-7xl mx-auto min-h-[80vh]">
        <!-- 1. Home / Login -->
        <section id="home-section" class="page-section w-full max-w-md">
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 text-center">
                <img src="https://i.ibb.co.com/nqLTzP3S/Chat-GPT-Image-10-Mei-2026-21-40-08.png" class="h-24 mx-auto mb-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Selamat Datang</h2>
                <form id="student-form" class="space-y-4 text-left mt-6">
                    <input type="text" id="student-name" required class="w-full px-4 py-2 border rounded-xl" placeholder="Nama Lengkap">
                    <input type="text" id="student-school" required class="w-full px-4 py-2 border rounded-xl" placeholder="Asal Sekolah">
                    <select id="student-level" class="w-full px-4 py-2 border rounded-xl">
                        <option value="SD/MI">SD/MI</option>
                        <option value="SMP/MTS">SMP/MTS</option>
                        <option value="SMA/SMK">SMA/SMK</option>
                    </select>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Masuk Sekarang</button>
                </form>
            </div>
        </section>

        <!-- 3. Dashboard -->
        <section id="dashboard-section" class="page-section w-full max-w-4xl">
            <h1 class="text-3xl font-bold text-indigo-900 mb-6">Dashboard Peserta</h1>
            <div class="bg-white p-6 rounded-2xl shadow border">
                <p class="text-gray-600">Halo, <span id="display-name" class="font-bold"></span>! Selamat datang di area ujian.</p>
                <button onclick="window.location.hash='#pendaftaran'" class="mt-4 bg-indigo-600 text-white px-6 py-2 rounded-lg">Lihat Pendaftaran</button>
            </div>
        </section>
    </main>

    <script>
        // Fix routing loop: Redirect to hash based on auth state
        function handleRoute() {
            const hash = window.location.hash || '#';
            const name = localStorage.getItem('studentName');
            
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            
            if (name && hash === '#') {
                window.location.hash = '#dashboard';
                return;
            }

            if (hash === '#dashboard' && name) {
                document.getElementById('dashboard-section').classList.add('active');
                document.getElementById('nav-user').classList.remove('hidden');
                document.getElementById('display-name').innerText = name;
            } else {
                document.getElementById('home-section').classList.add('active');
            }
        }

        document.getElementById('student-form').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('studentName', document.getElementById('student-name').value);
            localStorage.setItem('studentSchool', document.getElementById('student-school').value);
            localStorage.setItem('studentLevel', document.getElementById('student-level').value);
            window.location.hash = '#dashboard';
            location.reload();
        });

        function confirmLogout() {
            localStorage.clear();
            window.location.hash = '#';
            location.reload();
        }

        window.addEventListener('hashchange', handleRoute);
        window.addEventListener('load', handleRoute);
    </script>

    <!-- InstanWeb AI Resiliency Fallback Script (Anti-Blank-Screen) -->
    <script id="instanweb-resiliency-fallback">
    (function() {
        window.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                if (!window.db) {
                    console.warn("⚠️ Firebase load failed, blocked, or slow (e.g. CORS on local file:// or bad version). Instantiating highly resilient LocalStorage mock engine...");
                    setupMockFirebase();
                    
                    // Re-trigger standard load routes
                    if (typeof handleRoute === 'function') {
                        console.log("Re-executing routes in offline sandbox...");
                        handleRoute();
                    }
                }
            }, 180);
        });

        function setupMockFirebase() {
            function getLocalData(colName) {
                const key = "mock_db_" + colName;
                const data = localStorage.getItem(key);
                if (!data) {
                    let initial = [];
                    if (colName === 'settings') {
                        initial = [{ id: 'global', showScore: true, paymentActive: true }];
                    } else if (colName === 'exams') {
                        initial = [
                            {
                                id: 'seed_math',
                                code: 'MATE23',
                                subject: 'Matematika Dasar',
                                duration: '60',
                                status: 'Aktif',
                                isKisiKisi: true,
                                questions: [
                                    {
                                        level: 'SD/MI',
                                        text: 'Berapakah hasil dari 25 x 4 + 50?',
                                        options: ['100', '150', '200', '250'],
                                        correctIndex: 1,
                                        image: ''
                                    },
                                    {
                                        level: 'SD/MI',
                                        text: 'Jika sebuah segitiga memiliki alas 10 cm dan tinggi 8 cm, berapakah luas segitiga tersebut?',
                                        options: ['40 cm²', '80 cm²', '20 cm²', '16 cm²'],
                                        correctIndex: 0,
                                        image: ''
                                    },
                                    {
                                        level: 'SMP/MTS',
                                        text: 'Tentukan nilai x dari persamaan kuadrat x² - 5x + 6 = 0!',
                                        options: ['x = 2 atau x = 3', 'x = -2 atau x = -3', 'x = 1 atau x = 6', 'x = -1 atau x = -6'],
                                        correctIndex: 0,
                                        image: ''
                                    },
                                    {
                                        level: 'SMA/SMK',
                                        text: 'Berapakah turunan pertama f_prime(x) dari f(x) = 3x³ - 5x² + 2x - 7?',
                                        options: ['f_prime(x) = 9x² - 10x + 2', 'f_prime(x) = 3x² - 5x + 2', 'f_prime(x) = 9x³ - 10x² + 2', 'f_prime(x) = 6x² - 5x + 2'],
                                        correctIndex: 0,
                                        image: ''
                                    }
                                ]
                            }
                        ];
                    } else if (colName === 'testimonials') {
                        initial = [
                            {
                                id: 'testi_1',
                                img: 'https://i.ibb.co.com/8DZVQkBv/sertifikat-manzcodecbt.png',
                                day: 'Senin',
                                date: '25',
                                month: 'Mei',
                                year: '2026',
                                time: '09:30',
                                timestamp: { seconds: Date.now() / 1000 }
                            }
                        ];
                    } else if (colName === 'broadcasts') {
                        initial = [
                            {
                                id: 'bc_welcome',
                                target: 'ALL',
                                text: 'Selamat datang di ManzCodeCBT! Gunakan Akun Ujian Anda atau masukkan kode ujian di atas untuk berpartisipasi.',
                                timestamp: { seconds: Date.now() / 1000 }
                            }
                        ];
                    }
                    localStorage.setItem(key, JSON.stringify(initial));
                    return initial;
                }
                return JSON.parse(data);
            }

            function setLocalData(colName, list) {
                localStorage.setItem("mock_db_" + colName, JSON.stringify(list));
                triggerListeners(colName);
            }

            const listeners = {};
            function triggerListeners(colName) {
                if (listeners[colName]) {
                    listeners[colName].forEach(function(cb) { cb(); });
                }
            }

            window.db = { isMock: true };
            window.collection = function(db, colName) { return { type: 'collection', name: colName }; };
            window.doc = function(db, colName, docId) { return { type: 'doc', col: colName, id: docId }; };
            window.query = function(col, constraints) { return { type: 'query', col: col.name, constraints: Array.prototype.slice.call(arguments, 1) }; };
            window.where = function(field, op, val) { return { type: 'where', field: field, op: op, val: val }; };

            window.addDoc = async function(colRef, data) {
                const colName = colRef.name;
                const list = getLocalData(colName);
                const newId = colName + "_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5);
                const enriched = Object.assign({ id: newId, timestamp: { seconds: Date.now() / 1000 } }, data);
                list.push(enriched);
                setLocalData(colName, list);
                return { id: newId };
            };

            window.setDoc = async function(docRef, data) {
                const colName = docRef.col;
                const docId = docRef.id;
                const list = getLocalData(colName);
                const idx = list.findIndex(function(item) { return item.id === docId; });
                if (idx !== -1) {
                    list[idx] = Object.assign({ id: docId }, data);
                } else {
                    list.push(Object.assign({ id: docId }, data));
                }
                setLocalData(colName, list);
            };

            window.updateDoc = async function(docRef, data) {
                const colName = docRef.col;
                const docId = docRef.id;
                const list = getLocalData(colName);
                const idx = list.findIndex(function(item) { return item.id === docId; });
                if (idx !== -1) {
                    list[idx] = Object.assign({}, list[idx], data);
                    setLocalData(colName, list);
                }
            };

            window.deleteDoc = async function(docRef) {
                const colName = docRef.col;
                const docId = docRef.id;
                const list = getLocalData(colName);
                const filtered = list.filter(function(item) { return item.id !== docId; });
                setLocalData(colName, filtered);
            };

            window.getDoc = async function(docRef) {
                const colName = docRef.col;
                const docId = docRef.id;
                const list = getLocalData(colName);
                const found = list.find(function(item) { return item.id === docId; });
                return {
                    exists: function() { return found !== undefined; },
                    data: function() { return found; }
                };
            };

            window.getDocs = async function(queryOrCol) {
                const colName = queryOrCol.type === 'query' ? queryOrCol.col : queryOrCol.name;
                let list = getLocalData(colName);

                if (queryOrCol.type === 'query' && queryOrCol.constraints) {
                    queryOrCol.constraints.forEach(function(con) {
                        if (con && con.type === 'where') {
                            list = list.filter(function(item) {
                                const val = item[con.field];
                                if (con.op === '==') return val === con.val;
                                return true;
                            });
                        }
                    });
                }

                return {
                    empty: list.length === 0,
                    forEach: function(cb) {
                        list.forEach(function(item) {
                            cb({
                                id: item.id,
                                data: function() { return item; }
                            });
                        });
                    }
                };
            };

            window.onSnapshot = function(ref, callback) {
                const colName = ref.col || ref.name;
                if (!listeners[colName]) {
                    listeners[colName] = [];
                }

                const listenerWrapper = async function() {
                    if (ref.id) {
                        const list = getLocalData(colName);
                        const found = list.find(function(item) { return item.id === ref.id; });
                        callback({
                            exists: function() { return found !== undefined; },
                            data: function() { return found; }
                        });
                    } else {
                        const snapshot = await window.getDocs(ref);
                        callback(snapshot);
                    }
                };

                listeners[colName].push(listenerWrapper);
                listenerWrapper();

                return function() {
                    listeners[colName] = listeners[colName].filter(function(cb) { return cb !== listenerWrapper; });
                };
            };
        }
    })();
    </script>
    </body>
</html>
