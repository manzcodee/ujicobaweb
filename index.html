<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="GvyTGbIx3Zov0CXr0f1voJ2LJnac-ppCl62NStzdY3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ManzChat - Live Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .pb-safe { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }
            .pt-safe { padding-top: max(0.75rem, env(safe-area-inset-top)); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-fall { animation: fall linear forwards; }
        .chat-bubble-me { border-bottom-right-radius: 4px; }
        .chat-bubble-other { border-bottom-left-radius: 4px; }
    </style>
</head>
<body class="flex items-center justify-center fixed inset-0 bg-gray-100 text-gray-800 font-sans overflow-hidden w-full h-full">
    
    <div id="notification-bar" class="fixed top-4 md:top-6 left-1/2 transform -translate-x-1/2 bg-white border-l-4 border-indigo-600 text-gray-800 px-4 py-3 rounded-xl shadow-2xl z-[100] flex items-center gap-3 transition-transform duration-300 translate-y-[-150%] cursor-pointer min-w-[300px] max-w-[90%]">
        <img id="notif-avatar" src="" class="w-10 h-10 rounded-full object-cover shadow-sm border border-gray-100">
        <div class="flex flex-col overflow-hidden flex-1">
            <span id="notif-title" class="font-bold text-sm truncate text-gray-800"></span>
            <span id="notif-desc" class="text-xs text-gray-500 truncate mt-0.5"></span>
        </div>
    </div>

    <div id="loading-screen" class="fixed inset-0 bg-white/90 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity duration-300">
        <div class="flex flex-col items-center animate-slide-up">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mb-4 shadow-lg"></div>
            <p class="text-indigo-600 font-bold tracking-wide">Loading ManzChat...</p>
        </div>
    </div>

    <div class="w-full h-full bg-white overflow-hidden flex border-none relative animate-fade-in">
        
        <div id="join-screen" class="hidden flex-col items-center justify-center w-full h-full p-6 sm:p-8 text-center bg-white absolute inset-0 z-40">
            <div class="w-24 h-24 sm:w-28 sm:h-28 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-full flex items-center justify-center mb-6 shadow-xl animate-slide-up">
                <svg class="w-12 h-12 sm:w-14 sm:h-14 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
            </div>
            <h2 class="text-4xl sm:text-5xl font-extrabold mb-3 text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 animate-slide-up" style="animation-delay: 0.1s">ManzChat</h2>
            <p class="text-gray-500 mb-10 text-base sm:text-lg max-w-sm mx-auto animate-slide-up" style="animation-delay: 0.2s">Connect with friends and play games.</p>
            
            <div class="w-full max-w-sm space-y-4 text-left animate-slide-up" style="animation-delay: 0.3s">
                <button id="google-login-btn" class="w-full bg-white border-2 border-gray-200 hover:border-indigo-100 hover:bg-indigo-50 active:scale-95 text-gray-700 font-bold py-3.5 px-4 rounded-2xl transition-all duration-200 shadow-sm flex items-center justify-center gap-3">
                    <svg class="w-6 h-6" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>
            </div>
        </div>

        <div id="main-screen" class="hidden w-full h-full flex-col md:flex-row relative bg-white">
            
            <div id="sidebar" class="w-full md:w-[320px] lg:w-[380px] bg-gray-50/80 backdrop-blur-md md:border-r border-gray-200 flex flex-col h-full absolute md:relative z-20 transition-transform duration-300 shadow-lg md:shadow-none">
                <div class="p-5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white flex justify-between items-center shadow-md z-10 pt-safe shrink-0">
                    <h1 class="text-2xl font-extrabold tracking-tight flex items-center gap-2">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                        ManzChat
                    </h1>
                    <button id="leave-btn" class="bg-white/20 hover:bg-white/30 rounded-full transition p-2 backdrop-blur-sm" title="Sign Out">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>

                <div class="p-4 bg-white border-b border-gray-100 flex items-center justify-between shadow-sm relative z-10 shrink-0">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="relative">
                            <img id="my-avatar" src="" class="w-12 h-12 rounded-full object-cover border-2 border-indigo-100 shadow-sm flex-shrink-0">
                            <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
                        </div>
                        <div class="flex flex-col truncate">
                            <span id="my-username" class="font-bold text-gray-800 truncate text-base"></span>
                            <span id="my-status" class="text-xs text-green-500 font-semibold">Online</span>
                        </div>
                    </div>
                    <button id="open-edit-modal-btn" class="text-gray-400 hover:text-indigo-600 transition p-2.5 bg-gray-50 hover:bg-indigo-50 rounded-full flex-shrink-0 border border-gray-100 shadow-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                    </button>
                </div>

                <div class="flex bg-white border-b border-gray-200 shadow-sm relative z-10 shrink-0 overflow-x-auto hide-scrollbar">
                    <button id="tab-private" class="flex-1 py-3.5 px-2 text-sm font-bold text-indigo-600 border-b-[3px] border-indigo-600 transition flex items-center justify-center gap-1.5">
                        Private
                    </button>
                    <button id="tab-group" class="flex-1 py-3.5 px-2 text-sm font-bold text-gray-500 border-b-[3px] border-transparent hover:text-indigo-500 hover:bg-gray-50 transition flex items-center justify-center gap-1.5">
                        Group
                    </button>
                    <button id="tab-public" class="flex-1 py-3.5 px-2 text-sm font-bold text-gray-500 border-b-[3px] border-transparent hover:text-indigo-500 hover:bg-gray-50 transition flex items-center justify-center gap-1.5">
                        Public
                    </button>
                    <button id="tab-game" class="flex-1 py-3.5 px-2 text-sm font-bold text-gray-500 border-b-[3px] border-transparent hover:text-indigo-500 hover:bg-gray-50 transition flex items-center justify-center gap-1.5">
                        Game
                    </button>
                </div>

                <div id="panel-private" class="flex-1 flex flex-col min-h-0 overflow-hidden bg-white">
                    <div class="p-3 border-b border-gray-100 bg-gray-50/50 shrink-0">
                        <div class="flex gap-2 relative">
                            <input id="friend-username-input" type="text" placeholder="Add friend by username..." class="flex-1 pl-3 pr-3 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm transition">
                            <button id="add-friend-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold transition shadow-sm active:scale-95">Add</button>
                        </div>
                    </div>
                    <div class="px-3 py-2 bg-gray-50 flex justify-between items-center border-b border-gray-100 shrink-0">
                        <span id="chat-list-title" class="text-xs font-bold text-gray-500 uppercase tracking-wider">Active Chats</span>
                        <button id="toggle-archive-btn" class="text-xs text-indigo-600 font-bold hover:text-indigo-800 transition flex items-center gap-1">
                            Archived (0)
                        </button>
                    </div>
                    <div class="flex-1 min-h-0 overflow-y-auto p-2 pb-safe md:pb-2">
                        <div id="friends-list" class="space-y-1"></div>
                    </div>
                </div>

                <div id="panel-group" class="hidden flex-1 flex flex-col min-h-0 overflow-hidden bg-white">
                    <div class="p-3 border-b border-gray-100 bg-gray-50/50 shrink-0">
                        <div class="flex gap-2 relative">
                            <input id="group-name-input" type="text" placeholder="New Group Name..." class="flex-1 pl-3 pr-3 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm transition">
                            <button id="create-group-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold transition shadow-sm active:scale-95">Create</button>
                        </div>
                    </div>
                    <div class="px-3 py-2 bg-gray-50 flex justify-between items-center border-b border-gray-100 shrink-0">
                        <span class="text-xs font-bold text-gray-500 uppercase tracking-wider">My Groups</span>
                    </div>
                    <div class="flex-1 min-h-0 overflow-y-auto p-2 pb-safe md:pb-2">
                        <div id="groups-list" class="space-y-1"></div>
                    </div>
                </div>

                <div id="panel-game" class="hidden flex-1 flex-col min-h-0 overflow-y-auto bg-white p-4 items-center justify-center space-y-3">
                    <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-500 mb-1 shadow-sm">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800">Tic Tac Toe</h3>
                    <button id="play-bot-btn" class="w-full max-w-xs bg-white border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-50 font-bold py-3 px-4 rounded-xl transition shadow-sm">Play vs Bot</button>
                    <button id="find-match-btn" class="w-full max-w-xs bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-sm">Find Online Match</button>
                    <p id="match-status" class="text-sm text-indigo-500 font-semibold h-4"></p>
                    <div class="w-full max-w-xs mt-2 pt-4 border-t border-gray-100 flex flex-col items-center space-y-3">
                        <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider">Play with Friend</h4>
                        <button id="create-room-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-sm">Create Room</button>
                        <div class="flex w-full gap-2">
                            <input id="room-code-input" type="text" placeholder="Room Code" class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 uppercase text-center font-bold text-gray-700">
                            <button id="join-room-btn" class="bg-purple-100 text-purple-700 hover:bg-purple-200 font-bold py-3 px-5 rounded-xl transition shadow-sm">Join</button>
                        </div>
                        <p id="room-status" class="text-sm text-purple-500 font-semibold h-4"></p>
                    </div>
                </div>

            </div>
            
            <div id="main-content-area" class="hidden md:flex flex-1 flex-col h-full overflow-hidden absolute md:relative inset-0 md:inset-auto z-30 md:z-10 animate-fade-in w-full bg-gray-50">
                
                <div id="chat-header" class="bg-white px-4 py-3 md:px-6 md:py-4 flex items-center justify-between shadow-sm border-b border-gray-200 z-20 hidden pt-safe shrink-0">
                    <div class="flex items-center gap-3 md:gap-4">
                        <button id="back-to-sidebar-btn" class="md:hidden p-2 -ml-2 text-gray-500 hover:text-indigo-600 transition rounded-full hover:bg-gray-100 active:bg-gray-200">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <div id="chat-user-profile" class="flex items-center gap-3 cursor-pointer p-1.5 -ml-1.5 rounded-xl hover:bg-gray-100 transition">
                            <div class="relative">
                                <img id="chat-avatar" src="" class="w-10 h-10 md:w-12 md:h-12 rounded-full object-cover shadow-sm border border-gray-100">
                            </div>
                            <div class="flex flex-col">
                                <div class="flex items-center gap-2">
                                    <h2 id="chat-display-name" class="font-bold text-gray-800 text-base md:text-lg leading-tight"></h2>
                                    <span id="chat-original-name" class="opacity-50 text-sm font-normal hidden"></span>
                                    <button id="edit-nickname-btn" class="text-gray-400 hover:text-indigo-600 transition p-1 rounded-full hover:bg-gray-200" title="Set Nickname">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                    </button>
                                </div>
                                <p id="chat-status" class="text-xs text-gray-500 font-medium mt-0.5"></p>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="love-btn" class="hidden text-2xl hover:scale-110 transition active:scale-95" title="Send Love">❤️</button>
                    </div>
                </div>

                <div id="no-chat-header" class="absolute inset-0 flex-col items-center justify-center bg-gray-50/80 z-40 hidden animate-fade-in">
                    <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center mb-6 shadow-md text-indigo-300">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-700 mb-2">Welcome to ManzChat</h2>
                    <p class="text-gray-500 text-center max-w-xs">Select a chat or game to start.</p>
                </div>
                
                <div id="messages" class="flex-1 min-h-0 overflow-y-auto p-4 md:p-6 space-y-5 bg-[#E5DDD5] hidden relative z-10" style="background-image: url('https://www.transparenttextures.com/patterns/cubes.png');"></div>
                
                <div id="input-area" class="bg-white p-3 md:p-4 border-t border-gray-200 flex items-center gap-2 md:gap-3 pb-safe z-20 hidden shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] shrink-0 w-full">
                    <button id="share-loc-btn" class="p-2 text-gray-400 hover:text-blue-500 transition rounded-full hover:bg-gray-100 flex-shrink-0 text-xl" title="Share Live Location">📍</button>
                    <div class="flex-1 relative flex items-center">
                        <input id="message-input" type="text" class="w-full px-4 py-3 bg-gray-100 border border-transparent rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white text-gray-800 text-sm md:text-base transition shadow-sm" placeholder="Type a message...">
                    </div>
                    <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-full w-12 h-12 flex items-center justify-center transition duration-200 shadow-md flex-shrink-0 active:scale-95 group">
                        <svg class="w-5 h-5 transform group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>

                <div id="game-area" class="hidden flex-1 flex-col h-full bg-white z-20 absolute inset-0 w-full">
                    <div class="bg-white px-4 py-3 md:px-6 md:py-4 flex items-center justify-between shadow-sm border-b border-gray-200 shrink-0 pt-safe">
                       <div class="flex items-center gap-3">
                           <button id="back-from-game-btn" class="md:hidden p-2 -ml-2 text-gray-500 hover:text-indigo-600 transition rounded-full hover:bg-gray-100">
                               <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                           </button>
                           <img id="game-opponent-avatar" src="" class="w-10 h-10 rounded-full object-cover shadow-sm border border-gray-100">
                           <div>
                               <h2 id="game-opponent-username" class="font-bold text-gray-800 text-base leading-tight"></h2>
                               <p id="game-opponent-status" class="text-xs text-indigo-500 font-medium mt-0.5">Playing...</p>
                           </div>
                       </div>
                       <div class="flex gap-2">
                           <button id="game-add-friend-btn" class="hidden bg-indigo-50 text-indigo-600 hover:bg-indigo-100 px-3 py-1.5 rounded-lg text-sm font-bold transition">Add Friend</button>
                           <button id="game-quit-btn" class="bg-red-50 text-red-600 hover:bg-red-100 px-3 py-1.5 rounded-lg text-sm font-bold transition">Quit</button>
                       </div>
                    </div>
                    
                    <div class="flex-1 flex flex-col items-center justify-start overflow-y-auto bg-gray-50 p-4 pb-safe w-full">
                        <div id="game-score-display" class="text-lg font-bold text-gray-600 mb-2">
                            Score - You: <span id="my-score" class="text-indigo-600">0</span> | Opponent: <span id="opp-score" class="text-red-500">0</span>
                        </div>
                        <h3 id="game-status-text" class="text-2xl sm:text-3xl font-extrabold mb-6 text-gray-800">Your Turn (X)</h3>
                        
                        <div id="tictactoe-board" class="grid grid-cols-3 gap-2 sm:gap-3 bg-indigo-100 p-2 sm:p-3 rounded-2xl shadow-inner shrink-0">
                            <div class="ttt-cell w-20 h-20 sm:w-24 sm:h-24 bg-white rounded-xl flex items-center justify-center text-5xl sm:text-6xl font-bold cursor-pointer hover:bg-gray-50 transition shadow-sm" data-index="0"></div>
                            <div class="ttt-cell w-20 h-20 sm:w-24 sm:h-24 bg-white rounded-xl flex items-center justify-center text-5xl sm:text-6xl font-bold cursor-pointer hover:bg-gray-50 transition shadow-sm" data-index="1"></div>
                            <div class="ttt-cell w-20 h-20 sm:w-24 sm:h-24 bg-white rounded-xl flex items-center justify-center text-5xl sm:text-6xl font-bold cursor-pointer hover:bg-gray-50 transition shadow-sm" data-index="2"></div>
                            <div class="ttt-cell w-20 h-20 sm:w-24 sm:h-24 bg-white rounded-xl flex items-center justify-center text-5xl sm:text-6xl font-bold cursor-pointer hover:bg-gray-50 transition shadow-sm" data-index="3"></div>
                            <div class="ttt-cell w-20 h-20 sm:w-24 sm:h-24 bg-white rounded-xl flex items-center justify-center text-5xl sm:text-6xl font-bold cursor-pointer hover:bg-gray-50 transition shadow-sm" data-index="4"></div>
                            <div class="ttt-cell w-20 h-20 sm:w-24 sm:h-24 bg-white rounded-xl flex items-center justify-center text-5xl sm:text-6xl font-bold cursor-pointer hover:bg-gray-50 transition shadow-sm" data-index="5"></div>
                            <div class="ttt-cell w-20 h-20 sm:w-24 sm:h-24 bg-white rounded-xl flex items-center justify-center text-5xl sm:text-6xl font-bold cursor-pointer hover:bg-gray-50 transition shadow-sm" data-index="6"></div>
                            <div class="ttt-cell w-20 h-20 sm:w-24 sm:h-24 bg-white rounded-xl flex items-center justify-center text-5xl sm:text-6xl font-bold cursor-pointer hover:bg-gray-50 transition shadow-sm" data-index="7"></div>
                            <div class="ttt-cell w-20 h-20 sm:w-24 sm:h-24 bg-white rounded-xl flex items-center justify-center text-5xl sm:text-6xl font-bold cursor-pointer hover:bg-gray-50 transition shadow-sm" data-index="8"></div>
                        </div>

                        <div id="game-chat-container" class="w-full max-w-md mt-6 flex-col h-48 border border-gray-200 rounded-2xl overflow-hidden bg-white hidden shadow-sm shrink-0">
                            <div id="game-messages" class="flex-1 overflow-y-auto p-3 space-y-2 text-sm bg-gray-50 flex flex-col"></div>
                            <div class="flex border-t border-gray-200 bg-white p-2 gap-2">
                                <input id="game-message-input" type="text" class="flex-1 px-3 py-2 bg-gray-100 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Chat here...">
                                <button id="game-send-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 rounded-xl font-bold text-sm transition active:scale-95">Send</button>
                            </div>
                        </div>

                        <div id="game-actions" class="mt-6 flex flex-col items-center gap-3 hidden shrink-0">
                            <button id="play-again-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-xl transition shadow-sm active:scale-95">Play Again</button>
                            <p id="rematch-status" class="text-sm text-indigo-500 font-semibold h-4 hidden"></p>
                            <div id="rematch-prompt" class="hidden flex flex-col items-center gap-3 bg-white p-4 rounded-xl shadow-md border border-indigo-100">
                                <p id="rematch-text" class="text-sm text-indigo-700 font-bold">Lawan mu ingin mengajak mu bermain lagi</p>
                                <div class="flex gap-3">
                                    <button id="accept-rematch-btn" class="bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded-lg font-bold transition">Terima</button>
                                    <button id="decline-rematch-btn" class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-lg font-bold transition">Tidak</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, getDoc, updateDoc, where, getDocs, limit, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDG3Etn46FE_79QQZuFnUJpY_fExfagSJc",
            authDomain: "webchatmanzcode.firebaseapp.com",
            projectId: "webchatmanzcode",
            storageBucket: "webchatmanzcode.firebasestorage.app",
            messagingSenderId: "449247016674",
            appId: "1:449247016674:web:fb7a3d2710dc2c7f0c50bb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUserDoc = null;
        let currentMode = 'private'; 
        let currentChatFriend = null;
        let currentGroupId = null;
        let messagesUnsubscribe = null;
        let friendsUnsubscribe = null;
        let groupsUnsubscribe = null;
        let publicUnsubscribe = null;
        window.activeChatUnsubscribe = null;

        const loadingScreen = document.getElementById('loading-screen');
        const joinScreen = document.getElementById('join-screen');
        const mainScreen = document.getElementById('main-screen');
        const chatHeader = document.getElementById('chat-header');
        const noChatHeader = document.getElementById('no-chat-header');
        const messagesDiv = document.getElementById('messages');
        const inputArea = document.getElementById('input-area');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const friendsList = document.getElementById('friends-list');
        const groupsList = document.getElementById('groups-list');
        const panelPrivate = document.getElementById('panel-private');
        const panelGroup = document.getElementById('panel-group');
        const sidebar = document.getElementById('sidebar');
        const mainContentArea = document.getElementById('main-content-area');
        
        async function setOnlineStatus(isOnline) {
            if(currentUserDoc) {
                try {
                    await updateDoc(doc(db, "users", currentUserDoc.uid), {
                        isOnline: isOnline,
                        lastSeen: serverTimestamp()
                    });
                } catch(e){}
            }
        }

        onAuthStateChanged(auth, async (user) => {
            loadingScreen.classList.add('hidden');
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    const generatedUsername = (user.displayName || 'User').replace(/\s+/g, '') + Math.floor(Math.random() * 1000);
                    currentUserDoc = { uid: user.uid, username: generatedUsername, avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`, isOnline: true, partnerUid: null };
                    await setDoc(userRef, currentUserDoc);
                } else {
                    currentUserDoc = userSnap.data();
                    await setOnlineStatus(true);
                }

                document.getElementById('my-avatar').src = currentUserDoc.avatar;
                document.getElementById('my-username').innerText = currentUserDoc.username;
                
                joinScreen.classList.add('hidden');
                mainScreen.classList.remove('hidden');
                mainScreen.classList.add('flex');
                
                loadFriends();
                loadGroups();
                switchTab('private');
            } else {
                if(currentUserDoc) setOnlineStatus(false);
                joinScreen.classList.remove('hidden');
                joinScreen.classList.add('flex');
                mainScreen.classList.add('hidden');
                mainScreen.classList.remove('flex');
                currentUserDoc = null;
            }
        });

        document.getElementById('google-login-btn').addEventListener('click', () => signInWithPopup(auth, provider));
        document.getElementById('leave-btn').addEventListener('click', () => signOut(auth));

        function switchTab(mode) {
            if(window.activeChatUnsubscribe) {
                window.activeChatUnsubscribe();
                window.activeChatUnsubscribe = null;
            }

            currentMode = mode;
            ['private', 'group', 'public', 'game'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.remove('text-indigo-600', 'border-indigo-600', 'bg-indigo-50/50');
                document.getElementById(`tab-${t}`).classList.add('text-gray-500', 'border-transparent');
            });
            
            document.getElementById(`tab-${mode}`).classList.remove('text-gray-500', 'border-transparent');
            document.getElementById(`tab-${mode}`).classList.add('text-indigo-600', 'border-indigo-600', 'bg-indigo-50/50');
            
            chatHeader.classList.add('hidden');
            noChatHeader.classList.add('hidden');
            noChatHeader.classList.remove('flex');
            messagesDiv.classList.add('hidden');
            inputArea.classList.add('hidden');
            panelPrivate.classList.add('hidden');
            panelGroup.classList.add('hidden');
            document.getElementById('panel-game').classList.add('hidden');
            document.getElementById('game-area').classList.add('hidden');

            if(messagesUnsubscribe) messagesUnsubscribe();
            if(publicUnsubscribe) publicUnsubscribe();
            
            if (mode === 'private') {
                panelPrivate.classList.remove('hidden');
                panelPrivate.classList.add('flex');
                handleSidebarToggle();
            } else if (mode === 'group') {
                panelGroup.classList.remove('hidden');
                panelGroup.classList.add('flex');
                handleSidebarToggle();
            } else if (mode === 'public') {
                handleSidebarToggle(true);
                openPublicChat();
            } else if (mode === 'game') {
                document.getElementById('panel-game').classList.remove('hidden');
                document.getElementById('panel-game').classList.add('flex');
                handleSidebarToggle();
            }
        }

        function handleSidebarToggle(forceMain = false) {
            if (window.innerWidth < 768) {
                if (forceMain) {
                    sidebar.classList.add('hidden');
                    mainContentArea.classList.remove('hidden');
                    mainContentArea.classList.add('flex');
                } else {
                    sidebar.classList.remove('hidden');
                    mainContentArea.classList.add('hidden');
                    mainContentArea.classList.remove('flex');
                }
            } else {
                noChatHeader.classList.remove('hidden');
                noChatHeader.classList.add('flex');
                mainContentArea.classList.remove('hidden');
                mainContentArea.classList.add('flex');
            }
        }

        document.getElementById('tab-private').addEventListener('click', () => switchTab('private'));
        document.getElementById('tab-group').addEventListener('click', () => switchTab('group'));
        document.getElementById('tab-public').addEventListener('click', () => switchTab('public'));
        document.getElementById('tab-game').addEventListener('click', () => switchTab('game'));
        
        document.getElementById('back-to-sidebar-btn').addEventListener('click', () => {
            sidebar.classList.remove('hidden');
            mainContentArea.classList.add('hidden');
            mainContentArea.classList.remove('flex');
        });

        // Group Logic
        function loadGroups() {
            const q = query(collection(db, "groups"), where("members", "array-contains", currentUserDoc.uid));
            groupsUnsubscribe = onSnapshot(q, (snapshot) => {
                groupsList.innerHTML = '';
                if(snapshot.empty) {
                    groupsList.innerHTML = `<div class="p-6 text-center text-gray-400 text-sm font-medium">No groups yet. Create one!</div>`;
                    return;
                }
                snapshot.forEach(docSnap => {
                    const groupData = docSnap.data();
                    const div = document.createElement('div');
                    div.className = "flex items-center gap-3 p-3 hover:bg-white rounded-xl cursor-pointer transition border border-transparent hover:border-gray-200 hover:shadow-sm mb-1";
                    div.innerHTML = `
                        <div class="relative">
                            <img src="${groupData.avatar}" class="w-12 h-12 rounded-full object-cover shadow-sm border border-gray-100">
                        </div>
                        <div class="flex flex-col flex-1 truncate">
                            <span class="font-bold text-gray-800 text-sm truncate">${groupData.name}</span>
                            <span class="text-xs text-gray-500 truncate mt-0.5">Tap to chat...</span>
                        </div>
                    `;
                    div.onclick = () => openGroupChat(docSnap.id, groupData);
                    groupsList.appendChild(div);
                });
            });
        }

        document.getElementById('create-group-btn').addEventListener('click', async () => {
            const name = document.getElementById('group-name-input').value.trim();
            if(!name) return;
            const randomAvatar = `https://api.dicebear.com/7.x/identicon/svg?seed=${Math.random()}`;
            await addDoc(collection(db, "groups"), {
                name: name,
                avatar: randomAvatar,
                ownerId: currentUserDoc.uid,
                members: [currentUserDoc.uid],
                createdAt: serverTimestamp()
            });
            document.getElementById('group-name-input').value = '';
        });

        window.openGroupChat = function(groupId, groupData) {
            currentMode = 'group';
            currentGroupId = groupId;
            handleSidebarToggle(true);
            noChatHeader.classList.add('hidden');
            noChatHeader.classList.remove('flex');
            chatHeader.classList.remove('hidden');
            messagesDiv.classList.remove('hidden');
            inputArea.classList.remove('hidden');

            document.getElementById('chat-avatar').src = groupData.avatar;
            document.getElementById('chat-display-name').innerText = groupData.name;
            document.getElementById('chat-status').innerText = `Owner: ${groupData.ownerId === currentUserDoc.uid ? 'You' : 'Member'}`;
            document.getElementById('chat-status').className = 'text-xs text-indigo-500 font-bold mt-0.5';

            if(messagesUnsubscribe) messagesUnsubscribe();
            const q = query(collection(db, "groups", groupId, "messages"), orderBy("timestamp", "asc"));
            messagesUnsubscribe = onSnapshot(q, (snapshot) => {
                messagesDiv.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const msg = docSnap.data();
                    displayMessage(msg, docSnap.id, groupData);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        };

        // Friends Logic
        let currentFriendsSnapshot = null;
        function renderFriendsList() {
            if(!currentFriendsSnapshot) return;
            friendsList.innerHTML = '';
            let relData = [];
            currentFriendsSnapshot.forEach(d => relData.push(d.data()));
            if(relData.length === 0) {
                friendsList.innerHTML = `<div class="p-6 text-center text-gray-400 text-sm font-medium">No friends yet. Add someone!</div>`;
                return;
            }
            relData.forEach((friendRel) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 p-3 hover:bg-white rounded-xl cursor-pointer transition border border-transparent hover:border-gray-200 hover:shadow-sm mb-1";
                div.innerHTML = `
                    <div class="relative">
                        <img src="${friendRel.avatar}" class="w-12 h-12 rounded-full object-cover shadow-sm border border-gray-100">
                    </div>
                    <div class="flex flex-col flex-1 truncate">
                        <span class="font-bold text-gray-800 text-sm truncate">${friendRel.username}</span>
                        <span class="text-xs text-gray-500 truncate mt-0.5">Tap to chat...</span>
                    </div>
                `;
                div.onclick = () => openPrivateChat(friendRel);
                friendsList.appendChild(div);
            });
        }

        function loadFriends() {
            const q = query(collection(db, "users", currentUserDoc.uid, "friends"));
            friendsUnsubscribe = onSnapshot(q, (snapshot) => {
                currentFriendsSnapshot = snapshot;
                renderFriendsList();
            });
        }

        document.getElementById('add-friend-btn').addEventListener('click', async () => {
            const username = document.getElementById('friend-username-input').value.trim();
            if(!username || username === currentUserDoc.username) return;
            const q = query(collection(db, "users"), where("username", "==", username));
            const snap = await getDocs(q);
            if(!snap.empty) {
                const friendDoc = snap.docs[0].data();
                await setDoc(doc(db, "users", currentUserDoc.uid, "friends", friendDoc.uid), { uid: friendDoc.uid, username: friendDoc.username, avatar: friendDoc.avatar });
                await setDoc(doc(db, "users", friendDoc.uid, "friends", currentUserDoc.uid), { uid: currentUserDoc.uid, username: currentUserDoc.username, avatar: currentUserDoc.avatar });
                document.getElementById('friend-username-input').value = '';
                alert("Friend added!");
            } else { alert("User not found!"); }
        });

        window.openPrivateChat = function(friend) {
            currentMode = 'private';
            currentChatFriend = friend;
            handleSidebarToggle(true);
            noChatHeader.classList.add('hidden');
            noChatHeader.classList.remove('flex');
            chatHeader.classList.remove('hidden');
            messagesDiv.classList.remove('hidden');
            inputArea.classList.remove('hidden');

            document.getElementById('chat-avatar').src = friend.avatar;
            document.getElementById('chat-display-name').innerText = friend.username;
            document.getElementById('chat-status').innerText = 'Online / Last Seen';

            if(messagesUnsubscribe) messagesUnsubscribe();
            const chatId = currentUserDoc.uid < friend.uid ? `${currentUserDoc.uid}_${friend.uid}` : `${friend.uid}_${currentUserDoc.uid}`;
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            messagesUnsubscribe = onSnapshot(q, (snapshot) => {
                messagesDiv.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const msg = docSnap.data();
                    if (msg.senderId !== currentUserDoc.uid && !msg.isRead) {
                        updateDoc(docSnap.ref, { isRead: true });
                    }
                    displayMessage(msg, docSnap.id);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        };

        function openPublicChat() {
            noChatHeader.classList.add('hidden');
            chatHeader.classList.remove('hidden');
            messagesDiv.classList.remove('hidden');
            inputArea.classList.remove('hidden');
            document.getElementById('chat-avatar').src = 'https://api.dicebear.com/7.x/shapes/svg?seed=public&backgroundColor=6366f1';
            document.getElementById('chat-display-name').innerText = 'Public Global Chat';
            document.getElementById('chat-status').innerText = 'Everyone is here';

            if(publicUnsubscribe) publicUnsubscribe();
            const q = query(collection(db, "public_messages"), orderBy("timestamp", "asc"));
            publicUnsubscribe = onSnapshot(q, (snapshot) => {
                messagesDiv.innerHTML = '';
                snapshot.forEach((docSnap) => displayMessage(docSnap.data(), docSnap.id));
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }

        function displayMessage(msg, docId, groupData = null) {
            const isMe = msg.senderId === currentUserDoc.uid;
            const msgEl = document.createElement('div');
            msgEl.className = `flex w-full space-x-2 max-w-[85%] md:max-w-[75%] animate-slide-up ${isMe ? 'ml-auto justify-end space-x-reverse' : ''}`;
            
            let ticksHTML = '';
            if (isMe && currentMode === 'private') {
                if (msg.isRead) {
                    ticksHTML = `
                    <div class="flex -space-x-1.5 ml-1">
                        <svg class="w-3.5 h-3.5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                        <svg class="w-3.5 h-3.5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                    </div>`;
                } else {
                    ticksHTML = `
                    <div class="flex ml-1">
                        <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>`;
                }
            }

            let roleTag = '';
            if (currentMode === 'group' && groupData) {
                if (msg.senderId === groupData.ownerId) {
                    roleTag = `<span class="text-[10px] bg-yellow-100 text-yellow-700 px-1 rounded ml-1">Owner grub ${groupData.name}</span>`;
                } else {
                    roleTag = `<span class="text-[10px] bg-gray-100 text-gray-700 px-1 rounded ml-1">Member grub ${groupData.name}</span>`;
                }
            }

            msgEl.innerHTML = `
                ${!isMe && (currentMode === 'public' || currentMode === 'group') ? `<img src="${msg.avatar}" class="h-8 w-8 rounded-full object-cover self-end mb-1 shadow-sm border border-gray-200">` : ''}
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-full">
                    ${!isMe && (currentMode === 'public' || currentMode === 'group') ? `<span class="text-[11px] text-gray-500 mb-1 px-1 font-bold">${msg.senderName} ${roleTag}</span>` : ''}
                    ${isMe && currentMode === 'group' ? `<span class="text-[11px] text-gray-500 mb-1 px-1 font-bold">You ${roleTag}</span>` : ''}
                    <div class="px-4 py-2.5 text-[15px] leading-relaxed shadow-sm break-words max-w-full ${isMe ? 'bg-indigo-600 text-white chat-bubble-me rounded-2xl rounded-tr-sm' : 'bg-white border border-gray-100 text-gray-800 chat-bubble-other rounded-2xl rounded-tl-sm'}">
                        <span>${msg.text}</span>
                        <div class="text-[10px] text-right mt-1.5 ${isMe ? 'text-indigo-200' : 'text-gray-400'} font-medium flex justify-end items-center gap-0.5">
                            ${ticksHTML}
                        </div>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(msgEl);
        }

        sendBtn.addEventListener('click', async () => {
            const text = messageInput.value.trim();
            if(!text) return;
            messageInput.value = '';
            
            const msgData = {
                senderId: currentUserDoc.uid,
                senderName: currentUserDoc.username,
                avatar: currentUserDoc.avatar,
                text: text,
                isRead: false,
                timestamp: serverTimestamp()
            };

            if(currentMode === 'private' && currentChatFriend) {
                const chatId = currentUserDoc.uid < currentChatFriend.uid ? `${currentUserDoc.uid}_${currentChatFriend.uid}` : `${currentChatFriend.uid}_${currentUserDoc.uid}`;
                await addDoc(collection(db, "chats", chatId, "messages"), msgData);
            } else if(currentMode === 'public') {
                await addDoc(collection(db, "public_messages"), msgData);
            } else if(currentMode === 'group' && currentGroupId) {
                await addDoc(collection(db, "groups", currentGroupId, "messages"), msgData);
            }
        });

        messageInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendBtn.click();
        });

    </script>
</body>
</html>
