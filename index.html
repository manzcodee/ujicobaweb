<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="GvyTGbIx3Zov0CXr0f1voJ2LJnac-ppCl62NStzdY3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ManzChat - Live Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for chat */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        
        /* Safe area padding for mobile devices */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .pb-safe { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }
            .pt-safe { padding-top: max(0.75rem, env(safe-area-inset-top)); }
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-fall { animation: fall linear forwards; }
        
        /* Chat Bubble Styles */
        .chat-bubble-me { border-bottom-right-radius: 4px; }
        .chat-bubble-other { border-bottom-left-radius: 4px; }
    </style>
</head>
<body class="flex items-center justify-center fixed inset-0 bg-gray-100 text-gray-800 font-sans overflow-hidden w-full h-full">
    
    <!-- Notification Bar -->
    <div id="notification-bar" class="fixed top-4 md:top-6 left-1/2 transform -translate-x-1/2 bg-white border-l-4 border-indigo-600 text-gray-800 px-4 py-3 rounded-xl shadow-2xl z-[100] flex items-center gap-3 transition-transform duration-300 translate-y-[-150%] cursor-pointer min-w-[300px] max-w-[90%]">
        <img id="notif-avatar" src="" class="w-10 h-10 rounded-full object-cover shadow-sm border border-gray-100">
        <div class="flex flex-col overflow-hidden flex-1">
            <span id="notif-title" class="font-bold text-sm truncate text-gray-800"></span>
            <span id="notif-desc" class="text-xs text-gray-500 truncate mt-0.5"></span>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 bg-white/90 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity duration-300">
        <div class="flex flex-col items-center animate-slide-up">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mb-4 shadow-lg"></div>
            <p class="text-indigo-600 font-bold tracking-wide">Loading ManzChat...</p>
        </div>
    </div>

    <!-- Container -->
    <div class="w-full h-full bg-white overflow-hidden flex border-none relative animate-fade-in">
        
        <!-- Join Screen -->
        <div id="join-screen" class="hidden flex-col items-center justify-center w-full h-full p-6 sm:p-8 text-center bg-white absolute inset-0 z-40">
            <div class="w-24 h-24 sm:w-28 sm:h-28 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-full flex items-center justify-center mb-6 shadow-xl animate-slide-up">
                <svg class="w-12 h-12 sm:w-14 sm:h-14 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
            </div>
            <h2 class="text-4xl sm:text-5xl font-extrabold mb-3 text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 animate-slide-up" style="animation-delay: 0.1s">ManzChat</h2>
            <p class="text-gray-500 mb-10 text-base sm:text-lg max-w-sm mx-auto animate-slide-up" style="animation-delay: 0.2s">Connect with friends and play games.</p>
            
            <div class="w-full max-w-sm space-y-4 text-left animate-slide-up" style="animation-delay: 0.3s">
                <button id="google-login-btn" class="w-full bg-white border-2 border-gray-200 hover:border-indigo-100 hover:bg-indigo-50 active:scale-95 text-gray-700 font-bold py-3.5 px-4 rounded-2xl transition-all duration-200 shadow-sm flex items-center justify-center gap-3">
                    <svg class="w-6 h-6" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>
            </div>
        </div>

        <!-- Main Dashboard & Chat Screen -->
        <div id="main-screen" class="hidden w-full h-full flex-col md:flex-row relative bg-white">
            
            <!-- Sidebar -->
            <div id="sidebar" class="w-full md:w-[320px] lg:w-[380px] bg-gray-50/80 backdrop-blur-md md:border-r border-gray-200 flex flex-col h-full absolute md:relative z-20 transition-transform duration-300 shadow-lg md:shadow-none">
                <!-- Branding -->
                <div class="p-5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white flex justify-between items-center shadow-md z-10 pt-safe shrink-0">
                    <h1 class="text-2xl font-extrabold tracking-tight flex items-center gap-2">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                        ManzChat
                    </h1>
                    <button id="leave-btn" class="bg-white/20 hover:bg-white/30 rounded-full transition p-2 backdrop-blur-sm" title="Sign Out">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>

                <!-- User Profile -->
                <div class="p-4 bg-white border-b border-gray-100 flex items-center justify-between shadow-sm relative z-10 shrink-0">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="relative">
                            <img id="my-avatar" src="" class="w-12 h-12 rounded-full object-cover border-2 border-indigo-100 shadow-sm flex-shrink-0">
                            <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
                        </div>
                        <div class="flex flex-col truncate">
                            <span id="my-username" class="font-bold text-gray-800 truncate text-base"></span>
                            <span id="my-status" class="text-xs text-green-500 font-semibold">Online</span>
                        </div>
                    </div>
                    <button id="open-edit-modal-btn" class="text-gray-400 hover:text-indigo-600 transition p-2.5 bg-gray-50 hover:bg-indigo-50 rounded-full flex-shrink-0 border border-gray-100 shadow-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                    </button>
                </div>

                <!-- Tabs -->
                <div class="flex bg-white border-b border-gray-200 shadow-sm relative z-10 shrink-0 overflow-x-auto">
                    <button id="tab-private" class="flex-1 py-3.5 px-2 text-sm font-bold text-indigo-600 border-b-[3px] border-indigo-600 transition flex items-center justify-center gap-1.5 whitespace-nowrap">
                        Private
                    </button>
                    <button id="tab-group" class="flex-1 py-3.5 px-2 text-sm font-bold text-gray-500 border-b-[3px] border-transparent hover:text-indigo-500 hover:bg-gray-50 transition flex items-center justify-center gap-1.5 whitespace-nowrap">
                        Groups
                    </button>
                    <button id="tab-public" class="flex-1 py-3.5 px-2 text-sm font-bold text-gray-500 border-b-[3px] border-transparent hover:text-indigo-500 hover:bg-gray-50 transition flex items-center justify-center gap-1.5 whitespace-nowrap">
                        Public
                    </button>
                    <button id="tab-game" class="flex-1 py-3.5 px-2 text-sm font-bold text-gray-500 border-b-[3px] border-transparent hover:text-indigo-500 hover:bg-gray-50 transition flex items-center justify-center gap-1.5 whitespace-nowrap">
                        Game
                    </button>
                </div>

                <!-- Tab Content: Private Chats -->
                <div id="panel-private" class="flex-1 flex flex-col min-h-0 overflow-hidden bg-white">
                    <div class="p-3 border-b border-gray-100 bg-gray-50/50 shrink-0">
                        <div class="flex gap-2 relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                            </div>
                            <input id="friend-username-input" type="text" placeholder="Add friend by username..." class="flex-1 pl-9 pr-3 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm transition">
                            <button id="add-friend-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold transition shadow-sm active:scale-95">Add</button>
                        </div>
                    </div>
                    
                    <!-- Toggle Archived Chats -->
                    <div class="px-3 py-2 bg-gray-50 flex justify-between items-center border-b border-gray-100 shrink-0">
                        <span id="chat-list-title" class="text-xs font-bold text-gray-500 uppercase tracking-wider">Active Chats</span>
                        <button id="toggle-archive-btn" class="text-xs text-indigo-600 font-bold hover:text-indigo-800 transition flex items-center gap-1">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg>
                            Archived (0)
                        </button>
                    </div>

                    <div class="flex-1 min-h-0 overflow-y-auto p-2 pb-safe md:pb-2">
                        <div id="friends-list" class="space-y-1"></div>
                    </div>
                </div>

                <!-- Tab Content: Groups -->
                <div id="panel-group" class="hidden flex-1 flex-col min-h-0 overflow-hidden bg-white">
                    <div class="p-3 border-b border-gray-100 bg-gray-50/50 shrink-0">
                        <button id="create-group-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold transition shadow-sm active:scale-95 flex justify-center items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            Create New Group
                        </button>
                    </div>
                    <div class="flex-1 min-h-0 overflow-y-auto p-2 pb-safe md:pb-2">
                        <div id="groups-list" class="space-y-1"></div>
                    </div>
                </div>

                <!-- Tab Content: Game -->
                <div id="panel-game" class="hidden flex-1 flex-col min-h-0 overflow-y-auto bg-white p-4 items-center justify-center space-y-3">
                    <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-500 mb-1 shadow-sm">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800">Tic Tac Toe</h3>
                    <p class="text-gray-500 text-sm text-center max-w-xs mb-2">Play against our smart bot or find an online opponent.</p>
                    
                    <button id="play-bot-btn" class="w-full max-w-xs bg-white border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-50 font-bold py-3 px-4 rounded-xl transition shadow-sm">Play vs Bot</button>
                    <button id="find-match-btn" class="w-full max-w-xs bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-sm">Find Online Match</button>
                    <p id="match-status" class="text-sm text-indigo-500 font-semibold h-4"></p>

                    <div class="w-full max-w-xs mt-2 pt-4 border-t border-gray-100 flex flex-col items-center space-y-3">
                        <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider">Play with Friend</h4>
                        <button id="create-room-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-sm">Create Room</button>
                        <div class="flex w-full gap-2">
                            <input id="room-code-input" type="text" placeholder="Room Code" class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 uppercase text-center font-bold text-gray-700">
                            <button id="join-room-btn" class="bg-purple-100 text-purple-700 hover:bg-purple-200 font-bold py-3 px-5 rounded-xl transition shadow-sm">Join</button>
                        </div>
                        <p id="room-status" class="text-sm text-purple-500 font-semibold h-4"></p>
                    </div>
                </div>

            </div>
            
            <!-- Chat / Game Area -->
            <div id="main-content-area" class="hidden md:flex flex-1 flex-col h-full overflow-hidden absolute md:relative inset-0 md:inset-auto z-30 md:z-10 animate-fade-in w-full bg-gray-50">
                
                <!-- Chat Header -->
                <div id="chat-header" class="bg-white px-4 py-3 md:px-6 md:py-4 flex items-center justify-between shadow-sm border-b border-gray-200 z-20 hidden pt-safe shrink-0">
                    <div class="flex items-center gap-3 md:gap-4">
                        <button id="back-to-sidebar-btn" class="md:hidden p-2 -ml-2 text-gray-500 hover:text-indigo-600 transition rounded-full hover:bg-gray-100 active:bg-gray-200">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <div id="chat-user-profile" class="flex items-center gap-3 cursor-pointer p-1.5 -ml-1.5 rounded-xl hover:bg-gray-100 transition">
                            <div class="relative">
                                <img id="chat-avatar" src="" class="w-10 h-10 md:w-12 md:h-12 rounded-full object-cover shadow-sm border border-gray-100">
                            </div>
                            <div class="flex flex-col">
                                <div class="flex items-center gap-2">
                                    <h2 id="chat-display-name" class="font-bold text-gray-800 text-base md:text-lg leading-tight"></h2>
                                    <span id="chat-original-name" class="opacity-50 text-sm font-normal hidden"></span>
                                    <button id="edit-nickname-btn" class="text-gray-400 hover:text-indigo-600 transition p-1 rounded-full hover:bg-gray-200" title="Set Nickname">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                    </button>
                                </div>
                                <p id="chat-status" class="text-xs text-gray-500 font-medium mt-0.5"></p>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="group-settings-btn" class="hidden p-2 text-gray-500 hover:bg-gray-100 rounded-full transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path></svg></button>
                        <button id="love-btn" class="hidden text-2xl hover:scale-110 transition active:scale-95" title="Send Love">❤️</button>
                    </div>
                </div>

                <!-- Empty State -->
                <div id="no-chat-header" class="absolute inset-0 flex-col items-center justify-center bg-gray-50/80 z-40 hidden animate-fade-in">
                    <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center mb-6 shadow-md text-indigo-300">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-700 mb-2">Welcome to ManzChat</h2>
                    <p class="text-gray-500 text-center max-w-xs">Select a friend or group to start chatting.</p>
                </div>
                
                <!-- Messages Area -->
                <div id="messages" class="flex-1 min-h-0 overflow-y-auto p-4 md:p-6 space-y-5 bg-[#E5DDD5] hidden relative z-10" style="background-image: url('https://www.transparenttextures.com/patterns/cubes.png');"></div>
                
                <!-- Input Area -->
                <div id="input-area" class="bg-white p-3 md:p-4 border-t border-gray-200 flex items-center gap-2 md:gap-3 pb-safe z-20 hidden shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] shrink-0 w-full">
                    <button class="p-2 text-gray-400 hover:text-indigo-600 transition rounded-full hover:bg-gray-100 flex-shrink-0" title="Add attachment">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                    </button>
                    <button id="share-loc-btn" class="p-2 text-gray-400 hover:text-blue-500 transition rounded-full hover:bg-gray-100 flex-shrink-0 text-xl" title="Share Live Location">
                        📍
                    </button>
                    <div class="flex-1 relative flex items-center">
                        <button class="absolute left-3 p-1.5 text-gray-400 hover:text-indigo-600 transition rounded-full hover:bg-gray-200 z-10" title="Add emoji">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </button>
                        <input id="message-input" type="text" class="w-full pl-11 pr-4 py-3 bg-gray-100 border border-transparent rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white text-gray-800 text-sm md:text-base transition shadow-sm" placeholder="Type a message...">
                    </div>
                    <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-full w-12 h-12 flex items-center justify-center transition duration-200 shadow-md flex-shrink-0 active:scale-95 group">
                        <svg class="w-5 h-5 transform group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>

                <!-- Game Area ... -->
                <div id="game-area" class="hidden flex-1 flex-col h-full bg-white z-20 absolute inset-0 w-full">
                    <!-- Game Code remains the same -->
                </div>

            </div>
        </div>
    </div>

    <!-- Create Group Modal -->
    <div id="create-group-modal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">
        <div class="bg-white rounded-3xl p-6 md:p-8 w-full max-w-sm shadow-2xl animate-slide-up">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Create Group</h2>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Group Name</label>
                    <input id="new-group-name" type="text" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition font-medium">
                </div>
                <div class="flex justify-end gap-3 mt-8">
                    <button id="close-create-group-btn" class="px-5 py-2.5 text-gray-600 font-bold hover:bg-gray-100 rounded-xl transition">Cancel</button>
                    <button id="save-group-btn" class="px-5 py-2.5 bg-indigo-600 font-bold text-white rounded-xl hover:bg-indigo-700 shadow-md transition flex items-center justify-center min-w-[100px] active:scale-95">Create</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Group Settings Modal -->
    <div id="group-settings-modal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl animate-slide-up flex flex-col max-h-[80vh]">
            <h2 class="text-xl font-bold text-gray-800 mb-4" id="group-settings-title">Group Settings</h2>
            
            <div class="flex gap-2 mb-4">
                <input id="add-member-input" type="text" placeholder="Add member by username..." class="flex-1 px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <button id="add-member-btn" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-bold">Add</button>
            </div>

            <div class="flex-1 overflow-y-auto mb-4 space-y-2" id="group-members-list">
                <!-- Members will be listed here -->
            </div>

            <div class="flex justify-between items-center mt-auto pt-4 border-t">
                <button id="leave-group-btn" class="px-4 py-2 bg-red-100 text-red-600 font-bold rounded-xl hover:bg-red-200 transition">Leave Group</button>
                <button id="close-group-settings-btn" class="px-4 py-2 bg-gray-100 text-gray-700 font-bold rounded-xl hover:bg-gray-200 transition">Close</button>
            </div>
        </div>
    </div>

    <!-- User Options Modal, Edit Profile Modal, Nickname Modal, Location Modal remain unchanged -->
    <div id="user-options-modal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-end md:items-center justify-center z-50 p-4 animate-fade-in">
        <div class="bg-white rounded-t-3xl md:rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-slide-up flex flex-col gap-3">
            <div class="flex items-center justify-center mb-2 md:hidden">
                <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
            </div>
            <div class="flex items-center gap-4 mb-4 border-b pb-4">
                <img id="options-avatar" src="" class="w-16 h-16 rounded-full object-cover shadow-sm">
                <div>
                    <h3 id="options-name" class="text-xl font-bold text-gray-800 leading-tight"></h3>
                    <p id="options-username" class="text-sm text-gray-500"></p>
                </div>
            </div>
            <button id="modal-partner-btn" class="w-full py-3.5 rounded-xl font-bold text-gray-700 bg-gray-100 hover:bg-gray-200 transition"></button>
            <button id="modal-pin-btn" class="w-full py-3.5 rounded-xl font-bold text-gray-700 bg-gray-100 hover:bg-gray-200 transition"></button>
            <button id="modal-archive-btn" class="w-full py-3.5 rounded-xl font-bold text-gray-700 bg-gray-100 hover:bg-gray-200 transition"></button>
            <button id="close-options-modal-btn" class="w-full py-3.5 mt-2 rounded-xl font-bold text-red-500 bg-red-50 hover:bg-red-100 transition">Cancel</button>
        </div>
    </div>

    <!-- Modals omitted for brevity, keeping existing functionality -->

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, getDoc, updateDoc, where, getDocs, limit, deleteDoc, increment, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDG3Etn46FE_79QQZuFnUJpY_fExfagSJc",
            authDomain: "webchatmanzcode.firebaseapp.com",
            projectId: "webchatmanzcode",
            storageBucket: "webchatmanzcode.firebasestorage.app",
            messagingSenderId: "449247016674",
            appId: "1:449247016674:web:fb7a3d2710dc2c7f0c50bb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUserDoc = null;
        let currentMode = 'private'; 
        let currentChatFriend = null;
        let currentGroup = null;
        let messagesUnsubscribe = null;
        let friendsUnsubscribe = null;
        let groupsUnsubscribe = null;
        let publicUnsubscribe = null;
        window.activeChatUnsubscribe = null;

        // Elements
        const loadingScreen = document.getElementById('loading-screen');
        const joinScreen = document.getElementById('join-screen');
        const mainScreen = document.getElementById('main-screen');
        const chatHeader = document.getElementById('chat-header');
        const noChatHeader = document.getElementById('no-chat-header');
        const messagesDiv = document.getElementById('messages');
        const inputArea = document.getElementById('input-area');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const friendsList = document.getElementById('friends-list');
        const groupsList = document.getElementById('groups-list');
        const panelPrivate = document.getElementById('panel-private');
        const panelGroup = document.getElementById('panel-group');
        const sidebar = document.getElementById('sidebar');
        const mainContentArea = document.getElementById('main-content-area');
        
        // Basic functions
        async function setOnlineStatus(isOnline) {
            if(currentUserDoc) {
                try {
                    await updateDoc(doc(db, "users", currentUserDoc.uid), {
                        isOnline: isOnline,
                        lastSeen: serverTimestamp()
                    });
                } catch(e){}
            }
        }

        onAuthStateChanged(auth, async (user) => {
            loadingScreen.classList.add('hidden');
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    const generatedUsername = (user.displayName || 'User').replace(/\s+/g, '') + Math.floor(Math.random() * 1000);
                    currentUserDoc = { uid: user.uid, username: generatedUsername, avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`, isOnline: true, partnerUid: null };
                    await setDoc(userRef, currentUserDoc);
                } else {
                    currentUserDoc = userSnap.data();
                    await setOnlineStatus(true);
                }
                
                document.getElementById('my-avatar').src = currentUserDoc.avatar;
                document.getElementById('my-username').innerText = currentUserDoc.username;
                
                joinScreen.classList.add('hidden');
                mainScreen.classList.remove('hidden');
                mainScreen.classList.add('flex');
                
                loadFriends();
                loadGroups();
                switchTab('private');
            } else {
                if(currentUserDoc) setOnlineStatus(false);
                joinScreen.classList.remove('hidden');
                joinScreen.classList.add('flex');
                mainScreen.classList.add('hidden');
                mainScreen.classList.remove('flex');
                currentUserDoc = null;
            }
        });

        document.getElementById('google-login-btn').addEventListener('click', () => signInWithPopup(auth, provider));
        document.getElementById('leave-btn').addEventListener('click', () => signOut(auth));

        function switchTab(mode) {
            if(window.activeChatUnsubscribe) {
                window.activeChatUnsubscribe();
                window.activeChatUnsubscribe = null;
            }
            if(messagesUnsubscribe) {
                messagesUnsubscribe();
                messagesUnsubscribe = null;
            }
            
            currentMode = mode;
            currentChatFriend = null;
            currentGroup = null;

            ['private', 'group', 'public', 'game'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.remove('text-indigo-600', 'border-indigo-600', 'bg-indigo-50/50');
                document.getElementById(`tab-${t}`).classList.add('text-gray-500', 'border-transparent');
            });
            
            document.getElementById(`tab-${mode}`).classList.remove('text-gray-500', 'border-transparent');
            document.getElementById(`tab-${mode}`).classList.add('text-indigo-600', 'border-indigo-600', 'bg-indigo-50/50');
            
            chatHeader.classList.add('hidden');
            noChatHeader.classList.add('hidden');
            noChatHeader.classList.remove('flex');
            messagesDiv.classList.add('hidden');
            inputArea.classList.add('hidden');
            panelPrivate.classList.add('hidden');
            panelGroup.classList.add('hidden');
            document.getElementById('panel-game').classList.add('hidden');
            document.getElementById('game-area').classList.add('hidden');

            if (mode === 'private') {
                panelPrivate.classList.remove('hidden');
                panelPrivate.classList.add('flex');
                handleSidebarMobile();
            } else if (mode === 'group') {
                panelGroup.classList.remove('hidden');
                panelGroup.classList.add('flex');
                handleSidebarMobile();
            } else if (mode === 'public') {
                handleSidebarMobile(true);
                openPublicChat();
            } else if (mode === 'game') {
                document.getElementById('panel-game').classList.remove('hidden');
                document.getElementById('panel-game').classList.add('flex');
                handleSidebarMobile();
            }
        }

        function handleSidebarMobile(forceMain = false) {
            if (window.innerWidth < 768) {
                if(forceMain) {
                    sidebar.classList.add('hidden');
                    mainContentArea.classList.remove('hidden');
                    mainContentArea.classList.add('flex');
                } else {
                    sidebar.classList.remove('hidden');
                    mainContentArea.classList.add('hidden');
                    mainContentArea.classList.remove('flex');
                }
            } else {
                noChatHeader.classList.remove('hidden');
                noChatHeader.classList.add('flex');
                mainContentArea.classList.remove('hidden');
                mainContentArea.classList.add('flex');
            }
        }

        document.getElementById('tab-private').addEventListener('click', () => switchTab('private'));
        document.getElementById('tab-group').addEventListener('click', () => switchTab('group'));
        document.getElementById('tab-public').addEventListener('click', () => switchTab('public'));
        document.getElementById('tab-game').addEventListener('click', () => switchTab('game'));
        
        document.getElementById('back-to-sidebar-btn').addEventListener('click', () => {
            sidebar.classList.remove('hidden');
            mainContentArea.classList.add('hidden');
            mainContentArea.classList.remove('flex');
            
            if(messagesUnsubscribe) {
                messagesUnsubscribe();
                messagesUnsubscribe = null;
            }
            currentChatFriend = null;
            currentGroup = null;

            if (currentMode !== 'private' && currentMode !== 'game' && currentMode !== 'group') {
                switchTab('private');
            }
        });

        // Chat logic for checkmarks fix
        window.openPrivateChat = function(friend) {
            currentMode = 'private';
            currentChatFriend = friend;
            currentGroup = null;
            
            handleSidebarMobile(true);

            noChatHeader.classList.add('hidden');
            noChatHeader.classList.remove('flex');
            chatHeader.classList.remove('hidden');
            messagesDiv.classList.remove('hidden');
            inputArea.classList.remove('hidden');
            document.getElementById('group-settings-btn').classList.add('hidden');
            document.getElementById('edit-nickname-btn').classList.remove('hidden');

            updateChatHeader(friend);
            
            if(messagesUnsubscribe) { messagesUnsubscribe(); messagesUnsubscribe = null; }
            
            const chatId = currentUserDoc.uid < friend.uid ? `${currentUserDoc.uid}_${friend.uid}` : `${friend.uid}_${currentUserDoc.uid}`;
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            messagesUnsubscribe = onSnapshot(q, (snapshot) => {
                messagesDiv.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const msg = docSnap.data();
                    
                    // Mark as read ONLY if the chat is actively open (which it is here)
                    if (msg.senderId !== currentUserDoc.uid && !msg.isRead) {
                        updateDoc(docSnap.ref, { isRead: true });
                    }
                    displayMessage(msg, docSnap.id);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        };

        function displayMessage(msg, docId) {
            const isMe = msg.senderId === currentUserDoc.uid;
            const msgEl = document.createElement('div');
            msgEl.className = `flex w-full space-x-2 max-w-[85%] md:max-w-[75%] animate-slide-up ${isMe ? 'ml-auto justify-end space-x-reverse' : ''}`;
            
            const timeString = msg.timestamp ? msg.timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
            
            let ticksHTML = '';
            if (isMe && currentMode === 'private') {
                if (msg.isRead) {
                    ticksHTML = `
                    <div class="flex -space-x-1.5 ml-1">
                        <svg class="w-3.5 h-3.5 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                        <svg class="w-3.5 h-3.5 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                    </div>`;
                } else {
                    ticksHTML = `
                    <div class="flex ml-1">
                        <svg class="w-3.5 h-3.5 text-indigo-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>`;
                }
            }

            let senderInfo = '';
            if (!isMe && (currentMode === 'public' || currentMode === 'group')) {
                let roleTagStr = '';
                if(currentMode === 'group' && msg.roleTag) {
                    roleTagStr = `<span class="opacity-60 font-normal ml-1">- ${msg.roleTag}</span>`;
                }
                senderInfo = `<span class="text-[11px] text-gray-500 mb-1 px-1 font-bold">${msg.senderName} ${roleTagStr}</span>`;
            }

            msgEl.innerHTML = `
                ${!isMe && (currentMode === 'public' || currentMode === 'group') ? `<img src="${msg.avatar}" class="h-8 w-8 rounded-full object-cover self-end mb-1 shadow-sm border border-gray-200">` : ''}
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-full">
                    ${senderInfo}
                    <div class="px-4 py-2.5 text-[15px] leading-relaxed shadow-sm break-words max-w-full ${isMe ? 'bg-indigo-600 text-white chat-bubble-me rounded-2xl rounded-tr-sm' : 'bg-white border border-gray-100 text-gray-800 chat-bubble-other rounded-2xl rounded-tl-sm'}">
                        <span>${msg.text}</span>
                        <div class="text-[10px] text-right mt-1.5 ${isMe ? 'text-indigo-200' : 'text-gray-400'} font-medium flex justify-end items-center gap-0.5">
                            ${timeString}
                            ${ticksHTML}
                        </div>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(msgEl);
        }

        sendBtn.addEventListener('click', async () => {
            const text = messageInput.value.trim();
            if(!text) return;
            messageInput.value = '';
            
            const msgData = {
                senderId: currentUserDoc.uid,
                senderName: currentUserDoc.username,
                avatar: currentUserDoc.avatar,
                text: text,
                isRead: false,
                timestamp: serverTimestamp()
            };

            if(currentMode === 'private' && currentChatFriend) {
                const chatId = currentUserDoc.uid < currentChatFriend.uid ? `${currentUserDoc.uid}_${currentChatFriend.uid}` : `${currentChatFriend.uid}_${currentUserDoc.uid}`;
                await addDoc(collection(db, "chats", chatId, "messages"), msgData);
            } else if(currentMode === 'public') {
                await addDoc(collection(db, "public_messages"), msgData);
            } else if(currentMode === 'group' && currentGroup) {
                let role = currentGroup.roles[currentUserDoc.uid] || 'member';
                let roleTag = role === 'owner' ? 'Owner grup' : (role === 'admin' ? 'Admin Grub' : `Member ${currentGroup.name}`);
                msgData.roleTag = roleTag;
                await addDoc(collection(db, "groups", currentGroup.id, "messages"), msgData);
            }
        });

        // Group Features
        document.getElementById('create-group-btn').addEventListener('click', () => {
            document.getElementById('create-group-modal').classList.remove('hidden');
        });

        document.getElementById('close-create-group-btn').addEventListener('click', () => {
            document.getElementById('create-group-modal').classList.add('hidden');
        });

        document.getElementById('save-group-btn').addEventListener('click', async () => {
            const name = document.getElementById('new-group-name').value.trim();
            if(!name) return;
            
            const docRef = await addDoc(collection(db, "groups"), {
                name: name,
                avatar: `https://api.dicebear.com/7.x/initials/svg?seed=${name}`,
                members: [currentUserDoc.uid],
                roles: { [currentUserDoc.uid]: 'owner' },
                createdAt: serverTimestamp()
            });
            
            document.getElementById('new-group-name').value = '';
            document.getElementById('create-group-modal').classList.add('hidden');
        });

        function loadGroups() {
            const q = query(collection(db, "groups"), where("members", "array-contains", currentUserDoc.uid));
            groupsUnsubscribe = onSnapshot(q, (snapshot) => {
                groupsList.innerHTML = '';
                if(snapshot.empty) {
                    groupsList.innerHTML = `<div class="p-6 text-center text-gray-400 text-sm font-medium">No groups yet.</div>`;
                    return;
                }
                
                snapshot.forEach(docSnap => {
                    const group = docSnap.data();
                    group.id = docSnap.id;
                    
                    const div = document.createElement('div');
                    div.className = "flex items-center gap-3 p-3 hover:bg-white rounded-xl cursor-pointer transition border border-transparent hover:border-gray-200 hover:shadow-sm mb-1";
                    div.innerHTML = `
                        <img src="${group.avatar}" class="w-12 h-12 rounded-full object-cover shadow-sm border border-gray-100">
                        <div class="flex flex-col flex-1 truncate">
                            <span class="font-bold text-gray-800 text-sm truncate">${group.name}</span>
                            <span class="text-xs text-gray-500 truncate mt-0.5">${group.members.length} members</span>
                        </div>
                    `;
                    div.onclick = () => openGroupChat(group);
                    groupsList.appendChild(div);
                });
            });
        }

        window.openGroupChat = function(group) {
            currentMode = 'group';
            currentGroup = group;
            currentChatFriend = null;
            
            handleSidebarMobile(true);

            noChatHeader.classList.add('hidden');
            chatHeader.classList.remove('hidden');
            messagesDiv.classList.remove('hidden');
            inputArea.classList.remove('hidden');
            
            document.getElementById('edit-nickname-btn').classList.add('hidden');
            document.getElementById('group-settings-btn').classList.remove('hidden');

            document.getElementById('chat-avatar').src = group.avatar;
            document.getElementById('chat-display-name').innerText = group.name;
            document.getElementById('chat-original-name').classList.add('hidden');
            document.getElementById('chat-status').innerText = `${group.members.length} members`;

            if(messagesUnsubscribe) { messagesUnsubscribe(); messagesUnsubscribe = null; }
            
            const q = query(collection(db, "groups", group.id, "messages"), orderBy("timestamp", "asc"));
            messagesUnsubscribe = onSnapshot(q, (snapshot) => {
                messagesDiv.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    displayMessage(docSnap.data(), docSnap.id);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        };

        document.getElementById('group-settings-btn').addEventListener('click', () => {
            if(!currentGroup) return;
            document.getElementById('group-settings-modal').classList.remove('hidden');
            renderGroupMembers();
        });

        document.getElementById('close-group-settings-btn').addEventListener('click', () => {
            document.getElementById('group-settings-modal').classList.add('hidden');
        });

        async function renderGroupMembers() {
            const list = document.getElementById('group-members-list');
            list.innerHTML = 'Loading...';
            
            const myRole = currentGroup.roles[currentUserDoc.uid] || 'member';
            
            let html = '';
            for(let uid of currentGroup.members) {
                const userSnap = await getDoc(doc(db, "users", uid));
                if(userSnap.exists()) {
                    const u = userSnap.data();
                    const role = currentGroup.roles[uid] || 'member';
                    const roleLabel = role === 'owner' ? 'Owner' : (role === 'admin' ? 'Admin' : 'Member');
                    
                    let actions = '';
                    if (myRole === 'owner' && uid !== currentUserDoc.uid) {
                        actions = `
                            <button onclick="makeGroupAdmin('${uid}')" class="text-xs text-indigo-600 px-2">Make Admin</button>
                            <button onclick="removeGroupMember('${uid}')" class="text-xs text-red-600 px-2">Remove</button>
                        `;
                    } else if (myRole === 'admin' && role === 'member') {
                        actions = `<button onclick="removeGroupMember('${uid}')" class="text-xs text-red-600 px-2">Remove</button>`;
                    }

                    html += `
                        <div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg">
                            <div class="flex items-center gap-2">
                                <img src="${u.avatar}" class="w-8 h-8 rounded-full">
                                <div>
                                    <p class="text-sm font-bold">${u.username}</p>
                                    <p class="text-[10px] text-gray-500">${roleLabel}</p>
                                </div>
                            </div>
                            <div>${actions}</div>
                        </div>
                    `;
                }
            }
            list.innerHTML = html;
        }

        document.getElementById('add-member-btn').addEventListener('click', async () => {
            const username = document.getElementById('add-member-input').value.trim();
            if(!username || !currentGroup) return;
            
            const q = query(collection(db, "users"), where("username", "==", username));
            const snap = await getDocs(q);
            if(!snap.empty) {
                const newMember = snap.docs[0].data();
                if(currentGroup.members.includes(newMember.uid)) {
                    alert("User is already in group.");
                } else {
                    await updateDoc(doc(db, "groups", currentGroup.id), {
                        members: arrayUnion(newMember.uid),
                        [`roles.${newMember.uid}`]: 'member'
                    });
                    currentGroup.members.push(newMember.uid);
                    currentGroup.roles[newMember.uid] = 'member';
                    document.getElementById('add-member-input').value = '';
                    renderGroupMembers();
                }
            } else {
                alert("User not found!");
            }
        });

        window.removeGroupMember = async (uid) => {
            if(confirm("Remove this member?")) {
                await updateDoc(doc(db, "groups", currentGroup.id), {
                    members: arrayRemove(uid)
                });
                currentGroup.members = currentGroup.members.filter(m => m !== uid);
                renderGroupMembers();
            }
        };

        window.makeGroupAdmin = async (uid) => {
            await updateDoc(doc(db, "groups", currentGroup.id), {
                [`roles.${uid}`]: 'admin'
            });
            currentGroup.roles[uid] = 'admin';
            renderGroupMembers();
        };

        document.getElementById('leave-group-btn').addEventListener('click', async () => {
            if(!currentGroup) return;
            if(confirm("Are you sure you want to leave this group?")) {
                await updateDoc(doc(db, "groups", currentGroup.id), {
                    members: arrayRemove(currentUserDoc.uid)
                });
                document.getElementById('group-settings-modal').classList.add('hidden');
                switchTab('group');
            }
        });

        // Other existing logic (loadFriends, updates, etc) remain mostly the same
        function loadFriends() {
            const q = query(collection(db, "users", currentUserDoc.uid, "friends"));
            friendsUnsubscribe = onSnapshot(q, (snapshot) => {
                // Keep original loadFriends logic
                friendsList.innerHTML = '';
                snapshot.forEach(docSnap => {
                    const friendRel = docSnap.data();
                    const div = document.createElement('div');
                    div.className = "flex items-center gap-3 p-3 hover:bg-white rounded-xl cursor-pointer transition border border-transparent hover:border-gray-200 hover:shadow-sm mb-1";
                    div.innerHTML = `
                        <img src="${friendRel.avatar}" class="w-12 h-12 rounded-full object-cover shadow-sm border border-gray-100">
                        <div class="flex flex-col flex-1 truncate">
                            <span class="font-bold text-gray-800 text-sm truncate">${friendRel.username}</span>
                        </div>
                    `;
                    div.onclick = () => openPrivateChat(friendRel);
                    friendsList.appendChild(div);
                });
            });
        }

        document.getElementById('add-friend-btn').addEventListener('click', async () => {
            const username = document.getElementById('friend-username-input').value.trim();
            if(!username || username === currentUserDoc.username) return;
            const q = query(collection(db, "users"), where("username", "==", username));
            const snap = await getDocs(q);
            if(!snap.empty) {
                const friendDoc = snap.docs[0].data();
                await setDoc(doc(db, "users", currentUserDoc.uid, "friends", friendDoc.uid), { uid: friendDoc.uid, username: friendDoc.username, avatar: friendDoc.avatar });
                await setDoc(doc(db, "users", friendDoc.uid, "friends", currentUserDoc.uid), { uid: currentUserDoc.uid, username: currentUserDoc.username, avatar: currentUserDoc.avatar });
                document.getElementById('friend-username-input').value = '';
                alert("Friend added successfully!");
            } else { 
                alert("User not found!"); 
            }
        });

        function updateChatHeader(friendData) {
            document.getElementById('chat-avatar').src = friendData.avatar;
            document.getElementById('chat-display-name').innerText = friendData.username;
            document.getElementById('chat-status').innerText = 'Online';
        }

    </script>
</body>
</html>
