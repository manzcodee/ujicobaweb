    <script id="instanweb-iframe-guard">
    (function() {
        if (window !== window.parent) {
            const originalReplace = window.location.replace;
            window.location.replace = function(url) {
                const hashIndex = url.indexOf('#');
                if (hashIndex !== -1) { window.location.hash = url.substring(hashIndex); return; }
                const originPrefix = window.location.origin + '/';
                const cleanUrl = url.split('?')[0];
                if (url === '/' || url === '' || cleanUrl === originPrefix || cleanUrl === window.location.origin) return;
                try { originalReplace.call(window.location, url); } catch(e) { window.location.hash = url; }
            };
            window.location.assign = window.location.replace;
        }
    })();
    </script>

    <!-- InstanWeb AI Resiliency Fallback Script (Anti-Blank-Screen) -->
    <script id="instanweb-resiliency-fallback">
    (function() {
        window.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                if (!window.db) {
                    console.warn("⚠️ Firebase load failed, blocked, or slow (e.g. CORS on local file:// or bad version). Instantiating highly resilient LocalStorage mock engine...");
                    setupMockFirebase();
                    
                    // Re-trigger standard load routes
                    if (typeof handleRoute === 'function') {
                        console.log("Re-executing routes in offline sandbox...");
                        handleRoute();
                    }
                }
            }, 180);
        });

        function setupMockFirebase() {
            function getLocalData(colName) {
                const key = "mock_db_" + colName;
                const data = localStorage.getItem(key);
                if (!data) {
                    let initial = [];
                    if (colName === 'settings') {
                        initial = [{ id: 'global', showScore: true, paymentActive: true }];
                    } else if (colName === 'exams') {
                        initial = [
                            {
                                id: 'seed_math',
                                code: 'MATE23',
                                subject: 'Matematika Dasar',
                                duration: '60',
                                status: 'Aktif',
                                isKisiKisi: true,
                                questions: [
                                    {
                                        level: 'SD/MI',
                                        text: 'Berapakah hasil dari 25 x 4 + 50?',
                                        options: ['100', '150', '200', '250'],
                                        correctIndex: 1,
                                        image: ''
                                    },
                                    {
                                        level: 'SD/MI',
                                        text: 'Jika sebuah segitiga memiliki alas 10 cm dan tinggi 8 cm, berapakah luas segitiga tersebut?',
                                        options: ['40 cm²', '80 cm²', '20 cm²', '16 cm²'],
                                        correctIndex: 0,
                                        image: ''
                                    },
                                    {
                                        level: 'SMP/MTS',
                                        text: 'Tentukan nilai x dari persamaan kuadrat x² - 5x + 6 = 0!',
                                        options: ['x = 2 atau x = 3', 'x = -2 atau x = -3', 'x = 1 atau x = 6', 'x = -1 atau x = -6'],
                                        correctIndex: 0,
                                        image: ''
                                    },
                                    {
                                        level: 'SMA/SMK',
                                        text: 'Berapakah turunan pertama f_prime(x) dari f(x) = 3x³ - 5x² + 2x - 7?',
                                        options: ['f_prime(x) = 9x² - 10x + 2', 'f_prime(x) = 3x² - 5x + 2', 'f_prime(x) = 9x³ - 10x² + 2', 'f_prime(x) = 6x² - 5x + 2'],
                                        correctIndex: 0,
                                        image: ''
                                    }
                                ]
                            }
                        ];
                    } else if (colName === 'testimonials') {
                        initial = [
                            {
                                id: 'testi_1',
                                img: 'https://i.ibb.co.com/8DZVQkBv/sertifikat-manzcodecbt.png',
                                day: 'Senin',
                                date: '25',
                                month: 'Mei',
                                year: '2026',
                                time: '09:30',
                                timestamp: { seconds: Date.now() / 1000 }
                            }
                        ];
                    } else if (colName === 'broadcasts') {
                        initial = [
                            {
                                id: 'bc_welcome',
                                target: 'ALL',
                                text: 'Selamat datang di ManzCodeCBT! Gunakan Akun Ujian Anda atau masukkan kode ujian di atas untuk berpartisipasi.',
                                timestamp: { seconds: Date.now() / 1000 }
                            }
                        ];
                    }
                    localStorage.setItem(key, JSON.stringify(initial));
                    return initial;
                }
                return JSON.parse(data);
            }

            function setLocalData(colName, list) {
                localStorage.setItem("mock_db_" + colName, JSON.stringify(list));
                triggerListeners(colName);
            }

            const listeners = {};
            function triggerListeners(colName) {
                if (listeners[colName]) {
                    listeners[colName].forEach(function(cb) { cb(); });
                }
            }

            window.db = { isMock: true };
            window.collection = function(db, colName) { return { type: 'collection', name: colName }; };
            window.doc = function(db, colName, docId) { return { type: 'doc', col: colName, id: docId }; };
            window.query = function(col, constraints) { return { type: 'query', col: col.name, constraints: Array.prototype.slice.call(arguments, 1) }; };
            window.where = function(field, op, val) { return { type: 'where', field: field, op: op, val: val }; };

            window.addDoc = async function(colRef, data) {
                const colName = colRef.name;
                const list = getLocalData(colName);
                const newId = colName + "_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5);
                const enriched = Object.assign({ id: newId, timestamp: { seconds: Date.now() / 1000 } }, data);
                list.push(enriched);
                setLocalData(colName, list);
                return { id: newId };
            };

            window.setDoc = async function(docRef, data) {
                const colName = docRef.col;
                const docId = docRef.id;
                const list = getLocalData(colName);
                const idx = list.findIndex(function(item) { return item.id === docId; });
                if (idx !== -1) {
                    list[idx] = Object.assign({ id: docId }, data);
                } else {
                    list.push(Object.assign({ id: docId }, data));
                }
                setLocalData(colName, list);
            };

            window.updateDoc = async function(docRef, data) {
                const colName = docRef.col;
                const docId = docRef.id;
                const list = getLocalData(colName);
                const idx = list.findIndex(function(item) { return item.id === docId; });
                if (idx !== -1) {
                    list[idx] = Object.assign({}, list[idx], data);
                    setLocalData(colName, list);
                }
            };

            window.deleteDoc = async function(docRef) {
                const colName = docRef.col;
                const docId = docRef.id;
                const list = getLocalData(colName);
                const filtered = list.filter(function(item) { return item.id !== docId; });
                setLocalData(colName, filtered);
            };

            window.getDoc = async function(docRef) {
                const colName = docRef.col;
                const docId = docRef.id;
                const list = getLocalData(colName);
                const found = list.find(function(item) { return item.id === docId; });
                return {
                    exists: function() { return found !== undefined; },
                    data: function() { return found; }
                };
            };

            window.getDocs = async function(queryOrCol) {
                const colName = queryOrCol.type === 'query' ? queryOrCol.col : queryOrCol.name;
                let list = getLocalData(colName);

                if (queryOrCol.type === 'query' && queryOrCol.constraints) {
                    queryOrCol.constraints.forEach(function(con) {
                        if (con && con.type === 'where') {
                            list = list.filter(function(item) {
                                const val = item[con.field];
                                if (con.op === '==') return val === con.val;
                                return true;
                            });
                        }
                    });
                }

                return {
                    empty: list.length === 0,
                    forEach: function(cb) {
                        list.forEach(function(item) {
                            cb({
                                id: item.id,
                                data: function() { return item; }
                            });
                        });
                    }
                };
            };

            window.onSnapshot = function(ref, callback) {
                const colName = ref.col || ref.name;
                if (!listeners[colName]) {
                    listeners[colName] = [];
                }

                const listenerWrapper = async function() {
                    if (ref.id) {
                        const list = getLocalData(colName);
                        const found = list.find(function(item) { return item.id === ref.id; });
                        callback({
                            exists: function() { return found !== undefined; },
                            data: function() { return found; }
                        });
                    } else {
                        const snapshot = await window.getDocs(ref);
                        callback(snapshot);
                    }
                };

                listeners[colName].push(listenerWrapper);
                listenerWrapper();

                return function() {
                    listeners[colName] = listeners[colName].filter(function(cb) { return cb !== listenerWrapper; });
                };
            };
        }
    })();
    </script>
